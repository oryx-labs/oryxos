  <!-- SECTION LABELS                                          -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <text x="108" y="46" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="10" font-weight="700" fill="#3b82f6" letter-spacing="1.5">ENTRY CHANNELS</text>

  <text x="380" y="46" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="10" font-weight="700" fill="#f97316" letter-spacing="1.5">REACT ENGINE</text>

  <text x="660" y="46" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="10" font-weight="700" fill="#a855f7" letter-spacing="1.5">CAPABILITIES</text>

  <text x="860" y="46" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
