<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780" width="960" height="780"
     font-family="Arial, Helvetica, sans-serif">

  <defs>
    <marker id="a-blue"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#3b82f6"/>
    </marker>
    <marker id="a-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#d97706"/>
    </marker>
    <marker id="a-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#64748b"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000012"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="960" height="780" fill="#f0f4f8" rx="14"/>

  <!-- ─────────────────────────────────────
       TITLE
  ───────────────────────────────────── -->
  <text x="480" y="44" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">OryxOS — Architecture</text>
  <text x="480" y="66" text-anchor="middle" font-size="12" fill="#64748b">Java 21  ·  Spring Boot 3.x  ·  Spring AI Alibaba  ·  SQLite</text>

  <!-- ─────────────────────────────────────
       ROW 1 — Entry Channels   y=84~152
  ───────────────────────────────────── -->
  <!-- CLI Channel -->
  <rect x="148" y="84" width="240" height="68" rx="10" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="268" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">CLI Channel</text>
  <text x="268" y="133" text-anchor="middle" font-size="11" fill="#bfdbfe">oryxos chat  ·  oryxos-channel-cli</text>

  <!-- Web Service API -->
  <rect x="572" y="84" width="240" height="68" rx="10" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="692" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Web Service API</text>
  <text x="692" y="133" text-anchor="middle" font-size="11" fill="#bfdbfe">REST /api/v1  ·  oryxos-web</text>

  <!-- Bridge between channels -->
  <line x1="388" y1="118" x2="572" y2="118" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Arrows down (56 px gap to next section) -->
  <line x1="268" y1="152" x2="268" y2="208" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a-blue)"/>
  <line x1="692" y1="152" x2="692" y2="208" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a-blue)"/>

  <!-- ─────────────────────────────────────
       ROW 2 — ReAct Loop   y=212~362
  ───────────────────────────────────── -->
  <rect x="60" y="212" width="840" height="150" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.5" filter="url(#shadow)"/>

  <!-- Label inside box top -->
  <text x="480" y="234" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e" letter-spacing="1.5">CORE ENGINE  —  ReActLoop  ·  oryxos-core</text>

  <!-- 4 step boxes, each 185 × 106, gaps 18 px; starts at x=78 -->
  <!-- Box 1: PromptBuilder -->
  <rect x="78"  y="244" width="185" height="106" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1.5"/>
  <text x="170" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">PromptBuilder</text>
  <line x1="88" y1="276" x2="253" y2="276" stroke="#fde68a" stroke-width="1"/>
  <text x="170" y="294" text-anchor="middle" font-size="10" fill="#92400e">System prompt</text>
  <text x="170" y="310" text-anchor="middle" font-size="10" fill="#92400e">Bootstrap  ·  Skills</text>
  <text x="170" y="326" text-anchor="middle" font-size="10" fill="#92400e">Memory  ·  Tool list</text>
  <text x="170" y="342" text-anchor="middle" font-size="10" fill="#92400e">Session history</text>

  <!-- Box 2: ProviderService -->
  <rect x="281" y="244" width="185" height="106" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1.5"/>
  <text x="373" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">ProviderService</text>
  <line x1="291" y1="276" x2="456" y2="276" stroke="#fde68a" stroke-width="1"/>
  <text x="373" y="294" text-anchor="middle" font-size="10" fill="#92400e">ChatModel.call()</text>
  <text x="373" y="310" text-anchor="middle" font-size="10" fill="#92400e">Protocol translation</text>
  <text x="373" y="326" text-anchor="middle" font-size="10" fill="#92400e">Multi-provider routing</text>
  <text x="373" y="342" text-anchor="middle" font-size="10" fill="#92400e">llm_calls  →  SQLite</text>

  <!-- Box 3: Reason / Act -->
  <rect x="484" y="244" width="185" height="106" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1.5"/>
  <text x="576" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">Reason  ·  Act</text>
  <line x1="494" y1="276" x2="659" y2="276" stroke="#fde68a" stroke-width="1"/>
  <text x="576" y="294" text-anchor="middle" font-size="10" fill="#92400e">Parse LLM response</text>
  <text x="576" y="310" text-anchor="middle" font-size="10" fill="#92400e">Tool call?  Final reply?</text>
  <text x="576" y="326" text-anchor="middle" font-size="10" fill="#92400e">Loop control</text>
  <text x="576" y="342" text-anchor="middle" font-size="10" fill="#92400e">max_iterations guard</text>

  <!-- Box 4: ToolExecutor -->
  <rect x="687" y="244" width="185" height="106" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1.5"/>
  <text x="779" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">ToolExecutor</text>
  <line x1="697" y1="276" x2="862" y2="276" stroke="#fde68a" stroke-width="1"/>
  <text x="779" y="294" text-anchor="middle" font-size="10" fill="#92400e">SandboxChecker</text>
  <text x="779" y="310" text-anchor="middle" font-size="10" fill="#92400e">Execute tool call</text>
  <text x="779" y="326" text-anchor="middle" font-size="10" fill="#92400e">Append result</text>
  <text x="779" y="342" text-anchor="middle" font-size="10" fill="#92400e">tool_invocations  →  SQLite</text>

  <!-- Forward arrows between step boxes (mid-height of inner boxes y=297) -->
  <line x1="263" y1="297" x2="281" y2="297" stroke="#d97706" stroke-width="2" marker-end="url(#a-amber)"/>
  <line x1="466" y1="297" x2="484" y2="297" stroke="#d97706" stroke-width="2" marker-end="url(#a-amber)"/>
  <line x1="669" y1="297" x2="687" y2="297" stroke="#d97706" stroke-width="2" marker-end="url(#a-amber)"/>

  <!-- Arrows down (56 px gap to next section) -->
  <line x1="200" y1="362" x2="200" y2="418" stroke="#64748b" stroke-width="2" marker-end="url(#a-slate)"/>
  <line x1="480" y1="362" x2="480" y2="418" stroke="#64748b" stroke-width="2" marker-end="url(#a-slate)"/>
  <line x1="760" y1="362" x2="760" y2="418" stroke="#64748b" stroke-width="2" marker-end="url(#a-slate)"/>

  <!-- ─────────────────────────────────────
       ROW 3 — Capability Modules   y=422~566
  ───────────────────────────────────── -->

  <!-- Provider Module -->
  <rect x="60" y="422" width="266" height="144" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="193" y="449" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Provider</text>
  <text x="193" y="467" text-anchor="middle" font-size="10" fill="#166534">oryxos-provider</text>
  <line x1="74" y1="474" x2="312" y2="474" stroke="#86efac" stroke-width="1"/>
  <text x="193" y="493" text-anchor="middle" font-size="10" fill="#166534">DeepSeek  ·  Qwen  ·  Kimi</text>
  <text x="193" y="511" text-anchor="middle" font-size="10" fill="#166534">Zhipu  ·  Anthropic  ·  OpenAI</text>
  <text x="193" y="529" text-anchor="middle" font-size="10" fill="#166534">Ollama  ·  vLLM  ·  any endpoint</text>
  <text x="193" y="551" text-anchor="middle" font-size="9" fill="#4ade80">explicit: provider name  →  ChatModel</text>

  <!-- Memory Module -->
  <rect x="347" y="422" width="266" height="144" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="449" text-anchor="middle" font-size="14" font-weight="700" fill="#0c4a6e">Memory</text>
  <text x="480" y="467" text-anchor="middle" font-size="10" fill="#075985">oryxos-memory</text>
  <line x1="361" y1="474" x2="599" y2="474" stroke="#7dd3fc" stroke-width="1"/>
  <text x="480" y="493" text-anchor="middle" font-size="10" fill="#075985">Session Memory  (SQLite)</text>
  <text x="480" y="511" text-anchor="middle" font-size="10" fill="#075985">Long-term Memory  (MEMORY.md)</text>
  <text x="480" y="529" text-anchor="middle" font-size="10" fill="#075985">4000-char truncation guard</text>
  <text x="480" y="551" text-anchor="middle" font-size="9" fill="#38bdf8">save_memory  ·  recall_memory</text>

  <!-- Tool Module -->
  <rect x="634" y="422" width="266" height="144" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="767" y="449" text-anchor="middle" font-size="14" font-weight="700" fill="#3b0764">Tool</text>
  <text x="767" y="467" text-anchor="middle" font-size="10" fill="#4c1d95">oryxos-tool</text>
  <line x1="648" y1="474" x2="886" y2="474" stroke="#c4b5fd" stroke-width="1"/>
  <text x="767" y="493" text-anchor="middle" font-size="10" fill="#4c1d95">read_file  ·  write_file  ·  shell</text>
  <text x="767" y="511" text-anchor="middle" font-size="10" fill="#4c1d95">http_get  ·  http_post  ·  MCP Client</text>
  <text x="767" y="529" text-anchor="middle" font-size="10" fill="#4c1d95">ToolRegistry  ·  OryxTool interface</text>
  <text x="767" y="551" text-anchor="middle" font-size="9" fill="#a78bfa">SandboxChecker: path / cmd / domain</text>

  <!-- Arrows down (56 px gap) -->
  <line x1="200" y1="566" x2="200" y2="622" stroke="#64748b" stroke-width="2" marker-end="url(#a-slate)"/>
  <line x1="480" y1="566" x2="480" y2="622" stroke="#64748b" stroke-width="2" marker-end="url(#a-slate)"/>
  <line x1="760" y1="566" x2="760" y2="622" stroke="#64748b" stroke-width="2" marker-end="url(#a-slate)"/>

  <!-- ─────────────────────────────────────
       ROW 4 — Storage   y=626~736
  ───────────────────────────────────── -->

  <!-- SQLite -->
  <rect x="60" y="626" width="406" height="110" rx="10" fill="#ffffff" stroke="#fca5a5" stroke-width="2" filter="url(#shadow)"/>
  <text x="263" y="652" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">SQLite  ·  oryxos.db</text>
  <line x1="74" y1="660" x2="452" y2="660" stroke="#fca5a5" stroke-width="1"/>
  <text x="263" y="680" text-anchor="middle" font-size="10" fill="#7f1d1d">sessions  ·  tool_invocations  ·  llm_calls</text>
  <text x="263" y="698" text-anchor="middle" font-size="10" fill="#7f1d1d">SessionRepository  ·  ToolInvocationRepository  ·  LlmCallRepository</text>
  <text x="263" y="720" text-anchor="middle" font-size="10" font-weight="600" fill="#b91c1c">audit tables written on Day One — no exceptions</text>

  <!-- File System -->
  <rect x="494" y="626" width="406" height="110" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="697" y="652" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">File System  ·  .oryxos/</text>
  <line x1="508" y1="660" x2="886" y2="660" stroke="#cbd5e1" stroke-width="1"/>
  <text x="697" y="680" text-anchor="middle" font-size="10" fill="#475569">profiles/  ·  memory/MEMORY.md  ·  skills/  ·  logs/</text>
  <text x="697" y="698" text-anchor="middle" font-size="10" fill="#475569">AGENTS.md  ·  SOUL.md  ·  USER.md  ·  mcp_servers.yaml</text>
  <text x="697" y="718" text-anchor="middle" font-size="10" fill="#64748b">SnakeYAML  ·  ContextLoader  ·  Bootstrap injection</text>

  <!-- ─────────────────────────────────────
       FOOTER
  ───────────────────────────────────── -->
  <text x="480" y="764" text-anchor="middle" font-size="10" fill="#94a3b8">Supporting: oryxos-cli (Picocli · 12 subcommands)  ·  oryxos-boot (Spring Boot main)  ·  oryxos-channel-cli  ·  oryxos-web</text>

</svg>
