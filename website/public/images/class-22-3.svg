<svg viewBox="0 0 820 210" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="210" fill="#ffffff"/>
  <defs>
    <marker id="gg" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="40" y="70" width="170" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="125" y="100" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">① 本轮调用</text>
  <text x="125" y="120" fill="#1e40af" font-size="10" text-anchor="middle">save_memory(...)</text>
  <rect x="230" y="70" width="170" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="315" y="100" fill="#b45309" font-size="12" font-weight="bold" text-anchor="middle">② 写入</text>
  <text x="315" y="120" fill="#92400e" font-size="10" text-anchor="middle">MEMORY.md 对应区块</text>
  <rect x="420" y="70" width="170" height="70" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="505" y="100" fill="#6d28d9" font-size="12" font-weight="bold" text-anchor="middle">③ 下一轮</text>
  <text x="505" y="120" fill="#5b21b6" font-size="10" text-anchor="middle">PromptBuilder.build()</text>
  <rect x="610" y="70" width="170" height="70" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="695" y="100" fill="#15803d" font-size="12" font-weight="bold" text-anchor="middle">④ 重新读文件</text>
  <text x="695" y="120" fill="#166534" font-size="10" text-anchor="middle">不缓存，新内容已在里面</text>
  <line x1="210" y1="105" x2="226" y2="105" stroke="#94a3b8" stroke-width="2" marker-end="url(#gg)"/>
  <line x1="400" y1="105" x2="416" y2="105" stroke="#94a3b8" stroke-width="2" marker-end="url(#gg)"/>
  <line x1="590" y1="105" x2="606" y2="105" stroke="#94a3b8" stroke-width="2" marker-end="url(#gg)"/>
  <text x="410" y="180" fill="#64748b" font-size="12" text-anchor="middle">不缓存换来的是"记完立刻生效"——中间不用等任何刷新或过期</text>
</svg>
