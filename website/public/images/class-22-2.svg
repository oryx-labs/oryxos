<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="300" fill="#ffffff"/>
  <rect x="190" y="30" width="440" height="230" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="410" y="58" fill="#334155" font-size="15" font-weight="bold" text-anchor="middle">MEMORY.md</text>
  <rect x="220" y="75" width="380" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="410" y="102" fill="#b45309" font-size="13" font-weight="bold" text-anchor="middle">## 核心记忆</text>
  <text x="410" y="124" fill="#92400e" font-size="11" text-anchor="middle">永远完整注入 · load() 全量返回</text>
  <text x="410" y="142" fill="#92400e" font-size="10" text-anchor="middle">不参与截断，也不参与关键词检索</text>
  <rect x="220" y="165" width="380" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="192" fill="#1d4ed8" font-size="13" font-weight="bold" text-anchor="middle">## 归档记忆</text>
  <text x="410" y="214" fill="#1e40af" font-size="11" text-anchor="middle">超过阈值只保留最近内容</text>
  <text x="410" y="232" fill="#1e40af" font-size="10" text-anchor="middle">recallByKeyword() 只搜这一区</text>
  <text x="410" y="284" fill="#64748b" font-size="12" text-anchor="middle">核心记忆区永远保留；截断和检索都只作用在归档区</text>
</svg>
