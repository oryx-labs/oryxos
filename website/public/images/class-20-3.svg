<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="300" fill="#ffffff"/>
  <defs>
    <marker id="am3" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/></marker>
    <marker id="gr3" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22c55e"/></marker>
    <marker id="gy3" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="30" y="30" width="150" height="40" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="105" y="55" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">内置 @Tool</text>
  <rect x="30" y="78" width="150" height="40" rx="7" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="105" y="103" fill="#6d28d9" font-size="12" font-weight="bold" text-anchor="middle">业务 @Tool</text>
  <rect x="30" y="126" width="150" height="40" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.8"/>
  <text x="105" y="151" fill="#15803d" font-size="12" font-weight="bold" text-anchor="middle">MCP 工具</text>
  <line x1="180" y1="50" x2="248" y2="88" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#gy3)"/>
  <line x1="180" y1="98" x2="248" y2="98" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#gy3)"/>
  <line x1="180" y1="146" x2="248" y2="108" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#gy3)"/>
  <rect x="250" y="74" width="180" height="48" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="340" y="94" fill="#b45309" font-size="13" font-weight="bold" text-anchor="middle">ToolRegistry</text>
  <text x="340" y="112" fill="#92400e" font-size="10" text-anchor="middle">统一成 OryxTool</text>
  <text x="600" y="46" fill="#334155" font-size="13" text-anchor="middle" font-weight="bold">ToolExecutor 一次调用</text>
  <text x="600" y="74" fill="#334155" font-size="12" text-anchor="middle">① 按名字从 Registry 找到工具</text>
  <line x1="430" y1="98" x2="470" y2="98" stroke="#f59e0b" stroke-width="2" marker-end="url(#am3)"/>
  <text x="600" y="104" fill="#334155" font-size="12" text-anchor="middle">② 白名单校验（23、24 节详讲）</text>
  <text x="600" y="134" fill="#334155" font-size="12" text-anchor="middle">③ OryxTool.execute(参数)</text>
  <text x="600" y="164" fill="#334155" font-size="12" text-anchor="middle">④ 包成 ToolResult + 写 tool_invocations</text>
  <rect x="470" y="186" width="260" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.8"/>
  <text x="600" y="211" fill="#475569" font-size="12" text-anchor="middle">校验不过 → 抛异常，执行终止</text>
  <line x1="600" y1="170" x2="600" y2="184" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#gy3)"/>
  <line x1="470" y1="150" x2="360" y2="126" stroke="#22c55e" stroke-width="2" marker-end="url(#gr3)"/>
  <text x="410" y="250" fill="#15803d" font-size="12" text-anchor="middle">结果回给 ReAct 循环，进下一轮</text>
