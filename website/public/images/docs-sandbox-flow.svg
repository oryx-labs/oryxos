<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="400" fill="#ffffff"/>
  <defs>
    <marker id="tsda" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="40" y="30" width="200" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="60" fill="#1d4ed8" font-size="13" font-weight="bold" text-anchor="middle">FileTools.execute()</text>
  <rect x="40" y="100" width="200" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="130" fill="#1d4ed8" font-size="13" font-weight="bold" text-anchor="middle">ShellTools.execute()</text>
  <rect x="40" y="170" width="200" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="200" fill="#1d4ed8" font-size="13" font-weight="bold" text-anchor="middle">HttpTools.execute()</text>
  <line x1="240" y1="55" x2="318" y2="105" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#tsda)"/>
  <line x1="240" y1="125" x2="318" y2="125" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#tsda)"/>
  <line x1="240" y1="195" x2="318" y2="145" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#tsda)"/>
  <rect x="320" y="90" width="220" height="70" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="430" y="118" fill="#b45309" font-size="13" font-weight="bold" text-anchor="middle">WhitelistSandbox</text>
  <text x="430" y="136" fill="#92400e" font-size="10" text-anchor="middle">.enforce(action)</text>
  <line x1="430" y1="160" x2="430" y2="208" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#tsda)"/>
  <polygon points="430,210 510,240 430,270 350,240" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="430" y="236" fill="#475569" font-size="9.5" text-anchor="middle">命令/路径/域名</text>
  <text x="430" y="248" fill="#475569" font-size="9.5" text-anchor="middle">在白名单里？</text>
  <line x1="510" y1="240" x2="558" y2="240" stroke="#22c55e" stroke-width="1.8" marker-end="url(#tsda)"/>
  <text x="534" y="230" fill="#16a34a" font-size="11" text-anchor="middle">是</text>
  <rect x="560" y="215" width="200" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="245" fill="#15803d" font-size="12" font-weight="bold" text-anchor="middle">继续执行 Tool</text>
  <line x1="430" y1="270" x2="430" y2="308" stroke="#ef4444" stroke-width="1.8" marker-end="url(#tsda)"/>
  <text x="450" y="295" fill="#dc2626" font-size="11" text-anchor="middle">否</text>
  <rect x="330" y="310" width="220" height="50" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="440" y="340" fill="#b91c1c" font-size="12" font-weight="bold" text-anchor="middle">抛 SandboxViolationException</text>
  <text x="410" y="390" fill="#64748b" font-size="11.5" text-anchor="middle">不管放行还是拒绝，走的都是 ToolExecutor 原有的成功/失败审计路径，不需要新增审计代码</text>
</svg>
