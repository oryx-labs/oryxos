<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="480" fill="#ffffff"/>
  <defs>
    <marker id="tal1" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="210" y="20" width="400" height="50" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="410" y="52" fill="#4338ca" font-size="14" font-weight="bold" text-anchor="middle">POST /api/v1/agents</text>
  <line x1="410" y1="70" x2="410" y2="96" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#tal1)"/>
  <rect x="210" y="98" width="400" height="50" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="410" y="122" fill="#b45309" font-size="14" font-weight="bold" text-anchor="middle">AgentLifecycleService</text>
  <text x="410" y="140" fill="#92400e" font-size="10" text-anchor="middle">编排下面四个步骤</text>
  <line x1="410" y1="148" x2="410" y2="174" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#tal1)"/>
  <rect x="210" y="176" width="400" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="196" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">① 校验</text>
  <text x="410" y="212" fill="#1e40af" font-size="10" text-anchor="middle">Provider / Tool / Channel / Skill 合法性</text>
  <line x1="410" y1="218" x2="410" y2="226" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#tal1)"/>
  <rect x="210" y="228" width="400" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="248" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">② 写 Skill 文件</text>
  <text x="410" y="264" fill="#1e40af" font-size="10" text-anchor="middle">.oryxos/skills/&lt;name&gt;.md</text>
  <line x1="410" y1="270" x2="410" y2="278" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#tal1)"/>
  <rect x="210" y="280" width="400" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="300" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">③ 派生并注册 Profile</text>
  <text x="410" y="316" fill="#1e40af" font-size="10" text-anchor="middle">落盘 + ProfileRegistry 运行时注册</text>
  <line x1="410" y1="322" x2="410" y2="330" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#tal1)"/>
  <rect x="210" y="332" width="400" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="352" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">④ 注册定时（可选）</text>
  <text x="410" y="368" fill="#1e40af" font-size="10" text-anchor="middle">有 schedules 则 AgentScheduler 运行时注册</text>
  <line x1="410" y1="374" x2="410" y2="400" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#tal1)"/>
  <rect x="210" y="402" width="400" height="54" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="410" y="424" fill="#15803d" font-size="14" font-weight="bold" text-anchor="middle">200 OK</text>
  <text x="410" y="442" fill="#166534" font-size="11" text-anchor="middle">Agent 立刻可用，不用重启进程</text>
</svg>
