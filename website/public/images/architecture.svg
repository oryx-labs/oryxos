  <text x="366" y="448" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="#6b7280" text-anchor="middle">LLM 路由</text>
  <text x="366" y="462" font-family="'SF Mono','Fira Code',monospace" font-size="7.5" fill="#4b5563" text-anchor="middle">显式映射</text>
