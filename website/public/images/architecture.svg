  <text x="598" y="432" font-family="'SF Mono','Fira Code',monospace" font-size="9.5" fill="#c084fc" text-anchor="middle" font-weight="bold">Tool</text>
  <text x="598" y="448" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="#6b7280" text-anchor="middle">内置+MCP</text>
  <text x="598" y="462" font-family="'SF Mono','Fira Code',monospace" font-size="7.5" fill="#4b5563" text-anchor="middle">+ Sandbox</text>
  <rect x="664" y="412" width="100" height="64" rx="5" fill="#1e1030" stroke="#a855f7" stroke-width="1"/>
  <text x="714" y="432" font-family="'SF Mono','Fira Code',monospace" font-size="9.5" fill="#c084fc" text-anchor="middle" font-weight="bold">Notify</text>
  <text x="714" y="448" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="#6b7280" text-anchor="middle">出站推送</text>
  <text x="714" y="462" font-family="'SF Mono','Fira Code',monospace" font-size="7.5" fill="#4b5563" text-anchor="middle">NotifyTools</text>

  <line x1="540" y1="486" x2="540" y2="508" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr-gray)"/>

