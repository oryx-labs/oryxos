  <text x="332" y="126" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#3b82f6" font-weight="bold">Channel / Trigger Layer</text>
  <rect x="316" y="132" width="140" height="30" rx="5" fill="#1e2d4a" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="386" y="151" font-family="'SF Mono','Fira Code',monospace" font-size="9.5" fill="#93c5fd" text-anchor="middle">CLI · 人推</text>
  <rect x="470" y="132" width="140" height="30" rx="5" fill="#1e2d4a" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="540" y="151" font-family="'SF Mono','Fira Code',monospace" font-size="9.5" fill="#93c5fd" text-anchor="middle">REST API · 人推</text>
  <rect x="624" y="132" width="140" height="30" rx="5" fill="#1e2d4a" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="694" y="151" font-family="'SF Mono','Fira Code',monospace" font-size="9.5" fill="#93c5fd" text-anchor="middle">Scheduler · 钟推</text>

