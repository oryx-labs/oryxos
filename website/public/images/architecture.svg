  <rect x="316" y="534" width="216" height="42" rx="5" fill="#0f2a18" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="424" y="552" font-family="'SF Mono','Fira Code',monospace" font-size="9.5" fill="#4ade80" text-anchor="middle" font-weight="bold">SQLite (oryxos.db)</text>
  <text x="424" y="567" font-family="'SF Mono','Fira Code',monospace" font-size="8.5" fill="#6b7280" text-anchor="middle">sessions · tool_invocations · llm_calls</text>
  <rect x="548" y="534" width="216" height="42" rx="5" fill="#0f2a18" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="656" y="552" font-family="'SF Mono','Fira Code',monospace" font-size="9.5" fill="#4ade80" text-anchor="middle" font-weight="bold">Filesystem (.oryxos/)</text>
  <text x="656" y="567" font-family="'SF Mono','Fira Code',monospace" font-size="8.5" fill="#6b7280" text-anchor="middle">profiles · MEMORY.md · skills</text>

