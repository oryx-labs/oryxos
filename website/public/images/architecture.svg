  <rect x="860" y="624" width="196" height="56" rx="8" fill="#111" stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="958" y="646" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#6b7280" text-anchor="middle">BUSINESS SYSTEMS</text>
  <text x="958" y="664" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#9ca3af" text-anchor="middle">HTTP POST /api/v1/…</text>

  <line x1="122" y1="624" x2="300" y2="147" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <line x1="958" y1="624" x2="780" y2="147" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>

  <!-- ════════════════════════════════════════ -->
  <!-- Legend -->
  <!-- ════════════════════════════════════════ -->
  <rect x="300" y="612" width="480" height="78" rx="7" fill="#0d0d0d" stroke="#1f2937" stroke-width="1"/>
  <text x="540" y="632" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#4b5563" text-anchor="middle" letter-spacing="1">LEGEND</text>
  <text x="540" y="653" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#9ca3af" text-anchor="middle">蓝 = 触发入口　粉 = Agent 定义　橙 = 引擎　紫 = 能力　绿 = 存储　灰 = 外部依赖</text>
  <text x="540" y="674" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#6b7280" text-anchor="middle">实线 = 内部调用　　虚线 = 外部调用</text>
