  <!-- EXTERNAL: MCP Servers (top-right) -->
  <!-- ════════════════════════════════════════ -->
  <rect x="860" y="56" width="196" height="140" rx="8" fill="#111" stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="958" y="76" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="1">MCP SERVERS</text>
  <rect x="874" y="84" width="168" height="26" rx="5" fill="#1a1a1a" stroke="#374151" stroke-width="1"/>
  <text x="958" y="102" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#9ca3af" text-anchor="middle">github-mcp · news-mcp</text>
