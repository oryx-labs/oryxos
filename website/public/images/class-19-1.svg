<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="300" fill="#ffffff"/>
  <defs>
    <marker id="ntam1" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/></marker>
  </defs>
  <rect x="250" y="20" width="320" height="54" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="410" y="45" fill="#475569" font-size="14" font-weight="bold" text-anchor="middle">外部：用户 / 业务系统 / 定时触发</text>
  <text x="410" y="63" fill="#64748b" font-size="11" text-anchor="middle">CLI · REST API · AgentScheduler</text>
  <line x1="410" y1="74" x2="410" y2="100" stroke="#f59e0b" stroke-width="2" marker-end="url(#ntam1)"/>
  <text x="430" y="92" fill="#b45309" font-size="12" font-weight="bold">入站 · ChannelAdapter</text>
  <rect x="250" y="102" width="320" height="70" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2.6"/>
  <text x="410" y="130" fill="#4338ca" font-size="15" font-weight="bold" text-anchor="middle">Agent 执行（ReActLoop）</text>
  <text x="410" y="150" fill="#4338ca" font-size="11" text-anchor="middle">想清楚要做什么，要不要主动往外说</text>
  <line x1="410" y1="172" x2="410" y2="198" stroke="#f59e0b" stroke-width="2" marker-end="url(#ntam1)"/>
  <text x="430" y="190" fill="#b45309" font-size="12" font-weight="bold">出站 · NotifyChannelAdapter</text>
  <rect x="250" y="200" width="320" height="54" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="410" y="225" fill="#b45309" font-size="14" font-weight="bold" text-anchor="middle">外部：企业 IM 群 / Webhook</text>
  <text x="410" y="243" fill="#92400e" font-size="11" text-anchor="middle">企业微信 · 飞书 · 钉钉</text>
  <text x="410" y="280" fill="#64748b" font-size="12" text-anchor="middle">入站负责"怎么进来"，出站负责"怎么出去"——两个方向都要走 Adapter 插件模式，缺一个都不对称</text>
</svg>
