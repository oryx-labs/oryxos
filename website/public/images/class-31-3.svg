<svg viewBox="0 0 820 310" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="310" fill="#ffffff"/>
  <text x="410" y="32" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle">v0.1.0 发布产物：一个 JAR + 一个工作区</text>
  <rect x="40" y="55" width="360" height="160" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.4"/>
  <text x="220" y="82" fill="#b45309" font-size="13" font-weight="bold" text-anchor="middle">oryxos.jar（fat JAR）</text>
  <text x="62" y="110" fill="#92400e" font-size="10.5">· mvn clean package 一条命令产出</text>
  <text x="62" y="132" fill="#92400e" font-size="10.5">· 9 个模块 + 全部依赖打进一个文件</text>
  <text x="62" y="154" fill="#92400e" font-size="10.5">· java -jar 即可运行，无外部服务依赖</text>
  <text x="62" y="176" fill="#92400e" font-size="10.5">· 单二进制部署——技术方案第一章的承诺</text>
  <rect x="430" y="55" width="360" height="160" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2.4"/>
  <text x="610" y="82" fill="#15803d" font-size="13" font-weight="bold" text-anchor="middle">.oryxos/ 工作区（oryxos init 生成）</text>
  <text x="452" y="110" fill="#166534" font-size="10.5">· profiles/ 与 skills/ ——两个 Agent 的定义</text>
  <text x="452" y="132" fill="#166534" font-size="10.5">· memory/MEMORY.md ——长期记忆</text>
  <text x="452" y="154" fill="#166534" font-size="10.5">· mcp_servers.yaml · oryxos.db · Bootstrap 三件</text>
  <text x="452" y="176" fill="#166534" font-size="10.5">· 全部是文本和 SQLite，可备份可 git 跟踪</text>
  <rect x="40" y="235" width="750" height="42" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.8"/>
  <text x="415" y="261" fill="#475569" font-size="11.5" text-anchor="middle">git tag v0.1.0　·　README 快速开始　·　新手 30 分钟内从零跑到两个 Agent 自动工作（可运维性验收）</text>
</svg>
