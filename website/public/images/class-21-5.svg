<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="300" fill="#ffffff"/>
  <defs>
    <marker id="mw" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="270" y="20" width="280" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="410" y="50" fill="#4338ca" font-size="14" font-weight="bold" text-anchor="middle">ReActLoop / PromptBuilder</text>
  <line x1="410" y1="70" x2="410" y2="96" stroke="#94a3b8" stroke-width="2" marker-end="url(#mw)"/>
  <rect x="185" y="98" width="450" height="58" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="410" y="124" fill="#b45309" font-size="16" font-weight="bold" text-anchor="middle">MemoryService（门面 · 那道墙）</text>
  <text x="410" y="144" fill="#92400e" font-size="12" text-anchor="middle">上层只认这个接口，背后换什么无感</text>
  <line x1="410" y1="156" x2="410" y2="176" stroke="#f59e0b" stroke-width="2"/>
  <line x1="200" y1="176" x2="620" y2="176" stroke="#f59e0b" stroke-width="2"/>
  <line x1="200" y1="176" x2="200" y2="204" stroke="#f59e0b" stroke-width="2" marker-end="url(#mw)"/>
  <line x1="620" y1="176" x2="620" y2="204" stroke="#f59e0b" stroke-width="2" marker-end="url(#mw)"/>
  <rect x="60" y="206" width="280" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="230" fill="#1d4ed8" font-size="14" font-weight="bold" text-anchor="middle">阶段一：文件 + SQLite</text>
  <text x="200" y="248" fill="#1e40af" font-size="10" text-anchor="middle">核心 + 会话 + 归档三层</text>
  <rect x="480" y="206" width="280" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="620" y="230" fill="#15803d" font-size="14" font-weight="bold" text-anchor="middle">阶段二：向量检索</text>
  <text x="620" y="248" fill="#166534" font-size="10" text-anchor="middle">信号出现时再升级</text>
  <text x="410" y="285" fill="#64748b" font-size="12" text-anchor="middle">只要 MemoryService 接口不变，从左边换成右边，上层代码一行不用改</text>
</svg>
