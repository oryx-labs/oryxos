<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="300" fill="#ffffff"/>
  <defs>
    <marker id="am2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/></marker>
    <marker id="gr2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22c55e"/></marker>
  </defs>
  <rect x="40" y="30" width="180" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="130" y="60" fill="#4338ca" font-size="14" font-weight="bold" text-anchor="middle">ReActLoop</text>
  <rect x="320" y="30" width="200" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="420" y="60" fill="#b45309" font-size="14" font-weight="bold" text-anchor="middle">ProviderService</text>
  <rect x="620" y="30" width="160" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="700" y="60" fill="#1d4ed8" font-size="14" font-weight="bold" text-anchor="middle">ChatModel</text>
  <line x1="220" y1="45" x2="316" y2="45" stroke="#f59e0b" stroke-width="2" marker-end="url(#am2)"/>
  <text x="268" y="34" fill="#64748b" font-size="11" text-anchor="middle">chat(...)</text>
  <text x="420" y="120" fill="#334155" font-size="13" text-anchor="middle">① 从映射表取出 profile.provider 对应的 ChatModel</text>
  <text x="420" y="146" fill="#334155" font-size="13" text-anchor="middle">② 组装消息 + 工具 schema（关掉自动执行）</text>
  <line x1="520" y1="170" x2="616" y2="170" stroke="#f59e0b" stroke-width="2" marker-end="url(#am2)"/>
  <text x="568" y="163" fill="#64748b" font-size="11" text-anchor="middle">调用</text>
  <rect x="320" y="155" width="200" height="30" rx="6" fill="#fafafa" stroke="#cbd5e1" stroke-width="1"/>
  <text x="420" y="175" fill="#475569" font-size="12" text-anchor="middle">发起调用</text>
  <line x1="616" y1="205" x2="520" y2="205" stroke="#22c55e" stroke-width="2" marker-end="url(#gr2)"/>
  <text x="568" y="198" fill="#64748b" font-size="11" text-anchor="middle">Response</text>
  <text x="420" y="232" fill="#334155" font-size="13" text-anchor="middle">③ 写 llm_calls（provider / model / token，成功失败都写）</text>
  <line x1="316" y1="255" x2="220" y2="255" stroke="#22c55e" stroke-width="2" marker-end="url(#gr2)"/>
  <text x="268" y="248" fill="#64748b" font-size="11" text-anchor="middle">返回 Response</text>
  <text x="130" y="230" fill="#94a3b8" font-size="12" text-anchor="middle">（响应里可能带</text>
  <text x="130" y="248" fill="#94a3b8" font-size="12" text-anchor="middle">tool 调用请求）</text>
</svg>
