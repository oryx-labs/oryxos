<svg viewBox="0 0 980 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="980" height="300" fill="#ffffff"/>
  <defs>
    <marker id="c292" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="490" y="30" fill="#0f172a" font-size="15" font-weight="bold" text-anchor="middle">渐进式披露：三级内容，按需分阶段进上下文</text>

  <!-- L1 -->
  <rect x="40" y="52" width="900" height="66" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2.4"/>
  <circle cx="78" cy="85" r="18" fill="#16a34a"/><text x="78" y="90" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">L1</text>
  <text x="112" y="79" fill="#15803d" font-size="13" font-weight="bold" text-anchor="start">元数据（name + description）—— 永远在 system prompt</text>
  <text x="112" y="101" fill="#166534" font-size="10.5" text-anchor="start">全部已装能力的 name+description 拼成 &lt;available_skills&gt; 索引。装 100 个能力也几乎不占上下文；description 是模型判断"要不要用"的依据。</text>

  <!-- L2 -->
  <rect x="40" y="132" width="900" height="66" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.4"/>
  <circle cx="78" cy="165" r="18" fill="#3b82f6"/><text x="78" y="170" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">L2</text>
  <text x="112" y="159" fill="#1d4ed8" font-size="13" font-weight="bold" text-anchor="start">SKILL.md 正文（指令）—— 模型调 use_skill(name) 触发才加载</text>
  <text x="112" y="181" fill="#1e40af" font-size="10.5" text-anchor="start">模型按 description 判断相关，才 use_skill 取回正文作为工具结果进上下文。只在真用到时占上下文。</text>

  <!-- L3 -->
  <rect x="40" y="212" width="900" height="66" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.4"/>
  <circle cx="78" cy="245" r="18" fill="#f59e0b"/><text x="78" y="250" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">L3</text>
  <text x="112" y="239" fill="#b45309" font-size="13" font-weight="bold" text-anchor="start">资源与代码（scripts/*.py · REFERENCE.md）—— 用到才读 / 跑</text>
  <text x="112" y="261" fill="#92400e" font-size="10.5" text-anchor="start">正文里指向的脚本经 shell/python 跑、参考经 read_file 读。脚本产出结果进上下文、代码本身不进——确定性操作不烧 token。</text>

  <!-- 递进箭头 -->
  <line x1="490" y1="118" x2="490" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#c292)"/>
  <line x1="490" y1="198" x2="490" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#c292)"/>
</svg>
