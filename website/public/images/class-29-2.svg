<svg viewBox="0 0 980 238" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="980" height="238" fill="#ffffff"/>
  <defs>
    <marker id="c292" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="490" y="34" fill="#334155" font-size="15" font-weight="bold" text-anchor="middle">自动扫描：一份 Skill → 一个已注册、会自己跑的 Agent</text>

  <!-- ① 放文件 -->
  <rect x="24" y="60" width="212" height="112" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2.4"/>
  <text x="130" y="92" fill="#be185d" font-size="13" font-weight="bold" text-anchor="middle">① 放一份 SKILL.md</text>
  <text x="130" y="118" fill="#db2777" font-size="10.5" text-anchor="middle">进 .oryxos/skills/</text>
  <text x="130" y="138" fill="#db2777" font-size="10.5" text-anchor="middle">（或 30 节 API 写入）</text>

  <!-- ② 解析 -->
  <rect x="272" y="60" width="212" height="112" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.4"/>
  <text x="378" y="92" fill="#1d4ed8" font-size="13" font-weight="bold" text-anchor="middle">② 扫描 + 解析</text>
  <text x="378" y="118" fill="#1e40af" font-size="10.5" text-anchor="middle">SkillLoader 读文件</text>
  <text x="378" y="138" fill="#1e40af" font-size="10.5" text-anchor="middle">拆 frontmatter / 正文</text>

  <!-- ③ 派生 -->
  <rect x="520" y="60" width="212" height="112" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.4"/>
  <text x="626" y="92" fill="#b45309" font-size="13" font-weight="bold" text-anchor="middle">③ 派生 Profile</text>
  <text x="626" y="118" fill="#92400e" font-size="10.5" text-anchor="middle">deriveProfile(skill)</text>
  <text x="626" y="138" fill="#92400e" font-size="10.5" text-anchor="middle">frontmatter → Profile</text>

  <!-- ④ 注册 -->
  <rect x="768" y="60" width="212" height="112" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2.4"/>
  <text x="874" y="92" fill="#15803d" font-size="13" font-weight="bold" text-anchor="middle">④ 注册</text>
  <text x="874" y="115" fill="#166534" font-size="10.5" text-anchor="middle">ProfileRegistry；有</text>
  <text x="874" y="133" fill="#166534" font-size="10.5" text-anchor="middle">schedules 交 Scheduler</text>
  <text x="874" y="153" fill="#15803d" font-size="10.5" font-weight="bold" text-anchor="middle">→ 到点自己跑</text>

  <line x1="238" y1="116" x2="270" y2="116" stroke="#94a3b8" stroke-width="2" marker-end="url(#c292)"/>
  <line x1="486" y1="116" x2="518" y2="116" stroke="#94a3b8" stroke-width="2" marker-end="url(#c292)"/>
  <line x1="734" y1="116" x2="766" y2="116" stroke="#94a3b8" stroke-width="2" marker-end="url(#c292)"/>

  <text x="490" y="212" fill="#64748b" font-size="11.5" text-anchor="middle">启动时扫描 与 30 节 API 新增，走同一段"派生 + 注册"代码——两条来源行为必须一致</text>
</svg>
