<svg viewBox="0 0 820 270" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="270" fill="#ffffff"/>
  <defs>
    <marker id="c292" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <text x="410" y="34" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle">核心阶段：手动定义一个 Agent 的完整路径（不写一行 Java）</text>
  <rect x="40" y="70" width="170" height="80" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="125" y="98" fill="#be185d" font-size="11.5" font-weight="bold" text-anchor="middle">① 写 SKILL.md</text>
  <text x="125" y="118" fill="#db2777" font-size="9" text-anchor="middle">.oryxos/skills/&lt;name&gt;.md</text>
  <text x="125" y="134" fill="#db2777" font-size="9" text-anchor="middle">定义"做什么"</text>
  <line x1="210" y1="110" x2="243" y2="110" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c292)"/>
  <rect x="245" y="70" width="170" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="330" y="98" fill="#1d4ed8" font-size="11.5" font-weight="bold" text-anchor="middle">② 写 Profile YAML</text>
  <text x="330" y="118" fill="#1e40af" font-size="9" text-anchor="middle">.oryxos/profiles/&lt;name&gt;.yaml</text>
  <text x="330" y="134" fill="#1e40af" font-size="9" text-anchor="middle">skills 引用 + 运行时绑定</text>
  <line x1="415" y1="110" x2="448" y2="110" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c292)"/>
  <rect x="450" y="70" width="170" height="80" rx="8" fill="#ede9fe" stroke="#a855f7" stroke-width="2"/>
  <text x="535" y="98" fill="#7c3aed" font-size="11.5" font-weight="bold" text-anchor="middle">③ 加载生效</text>
  <text x="535" y="118" fill="#6b21a8" font-size="9" text-anchor="middle">Skill 改动即时生效（每次重读）</text>
  <text x="535" y="134" fill="#6b21a8" font-size="9" text-anchor="middle">新 Profile 需重启注册</text>
  <line x1="620" y1="110" x2="653" y2="110" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c292)"/>
  <rect x="655" y="70" width="130" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.4"/>
  <text x="720" y="98" fill="#b45309" font-size="11.5" font-weight="bold" text-anchor="middle">④ 自己跑起来</text>
  <text x="720" y="118" fill="#92400e" font-size="9" text-anchor="middle">schedules 到点触发</text>
  <text x="720" y="134" fill="#92400e" font-size="9" text-anchor="middle">notify 送出结果</text>
  <text x="410" y="200" fill="#64748b" font-size="11.5" text-anchor="middle">③ 里那个"新 Profile 需重启"就是本节要补的短板——运行时注册方法立好之后，</text>
  <text x="410" y="222" fill="#64748b" font-size="11.5" text-anchor="middle">30 节由 POST /api/v1/agents 一次调用完成①~④，免重启</text>
</svg>
