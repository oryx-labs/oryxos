<svg viewBox="0 0 820 310" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="310" fill="#ffffff"/>
  <text x="410" y="32" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle">两个 Demo（31 节）上场前的六项前置条件</text>
  <rect x="40" y="55" width="220" height="95" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="150" y="78" fill="#b45309" font-size="11.5" font-weight="bold" text-anchor="middle">① 域名白名单</text>
  <text x="150" y="100" fill="#92400e" font-size="9.5" text-anchor="middle">http.allowed_domains 已含</text>
  <text x="150" y="116" fill="#92400e" font-size="9.5" text-anchor="middle">天气 API 域名 + webhook 域名</text>
  <rect x="300" y="55" width="220" height="95" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="410" y="78" fill="#be185d" font-size="11.5" font-weight="bold" text-anchor="middle">② 通知渠道</text>
  <text x="410" y="100" fill="#db2777" font-size="9.5" text-anchor="middle">notify_channels 已配</text>
  <text x="410" y="116" fill="#db2777" font-size="9.5" text-anchor="middle">手动 notify 一次，群里收得到</text>
  <rect x="560" y="55" width="220" height="95" rx="8" fill="#ede9fe" stroke="#a855f7" stroke-width="2"/>
  <text x="670" y="78" fill="#7c3aed" font-size="11.5" font-weight="bold" text-anchor="middle">③ 新闻 MCP</text>
  <text x="670" y="100" fill="#6b21a8" font-size="9.5" text-anchor="middle">mcp_servers.yaml 已声明</text>
  <text x="670" y="116" fill="#6b21a8" font-size="9.5" text-anchor="middle">tool list 里能看到它的工具</text>
  <rect x="40" y="165" width="220" height="95" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="150" y="188" fill="#15803d" font-size="11.5" font-weight="bold" text-anchor="middle">④ 记忆里有偏好</text>
  <text x="150" y="210" fill="#166534" font-size="9.5" text-anchor="middle">对话里说过"更关注 AI 和芯片"</text>
  <text x="150" y="226" fill="#166534" font-size="9.5" text-anchor="middle">MEMORY.md 里已有这条</text>
  <rect x="300" y="165" width="220" height="95" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="188" fill="#1d4ed8" font-size="11.5" font-weight="bold" text-anchor="middle">⑤ 定时配置</text>
  <text x="410" y="210" fill="#1e40af" font-size="9.5" text-anchor="middle">cron 表达式 + 显式时区</text>
  <text x="410" y="226" fill="#1e40af" font-size="9.5" text-anchor="middle">（Asia/Shanghai）核对过</text>
  <rect x="560" y="165" width="220" height="95" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="670" y="188" fill="#475569" font-size="11.5" font-weight="bold" text-anchor="middle">⑥ 跨重启验证</text>
  <text x="670" y="210" fill="#64748b" font-size="9.5" text-anchor="middle">重启后 Session 还在</text>
  <text x="670" y="226" fill="#64748b" font-size="9.5" text-anchor="middle">定时任务重新注册成功</text>
  <text x="410" y="292" fill="#64748b" font-size="11.5" text-anchor="middle">六项全打勾，31 节的两个 Demo 才有干净的地基——现场调试最忌讳环境半好半坏</text>
</svg>
