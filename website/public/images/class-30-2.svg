<svg viewBox="0 0 960 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="960" height="360" fill="#ffffff"/>
  <defs>
    <marker id="c302" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="480" y="30" fill="#0f172a" font-size="15" font-weight="bold" text-anchor="middle">两类资源各包成一组端点 + 一个工作区文件浏览器 —— 别糊成一个</text>

  <!-- 能力 Skill 卡 -->
  <rect x="40" y="48" width="420" height="176" rx="11" fill="#fdf2f8" stroke="#db2777" stroke-width="2.4"/>
  <text x="250" y="72" fill="#be185d" font-size="13" font-weight="bold" text-anchor="middle">能力（Skill）— /api/v1/skills</text>
  <text x="62" y="98" fill="#9d174d" font-size="10.5" text-anchor="start">POST /skills — 上传一个能力目录（SKILL.md + scripts/）</text>
  <text x="62" y="120" fill="#9d174d" font-size="10.5" text-anchor="start">GET /skills · /{name} — 查能力库（L1 + 正文预览）</text>
  <text x="62" y="142" fill="#9d174d" font-size="10.5" text-anchor="start">DELETE /{name} — 从 SkillRegistry 移除 + 归档</text>
  <text x="62" y="164" fill="#9d174d" font-size="10.5" text-anchor="start">POST /skills/generate — 一句话 → SKILL.md 草稿</text>
  <text x="62" y="196" fill="#be185d" font-size="10" font-weight="bold" text-anchor="start">被 N 个 Agent 共享：上传一次，全体可用</text>

  <!-- Agent Profile 卡 -->
  <rect x="500" y="48" width="420" height="176" rx="11" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.4"/>
  <text x="710" y="72" fill="#b45309" font-size="13" font-weight="bold" text-anchor="middle">Agent（Profile）— /api/v1/agents</text>
  <text x="522" y="98" fill="#92400e" font-size="10.5" text-anchor="start">POST /agents — 建（写 Profile YAML）</text>
  <text x="522" y="120" fill="#92400e" font-size="10.5" text-anchor="start">GET · PUT（改 schedules 先注销）· DELETE（归档）</text>
  <text x="522" y="142" fill="#92400e" font-size="10.5" text-anchor="start">POST /agents/generate — 一句话 → Profile 草稿</text>
  <text x="522" y="164" fill="#92400e" font-size="10.5" text-anchor="start">POST /{name}/invoke — 26 节无状态调用（不变）</text>
  <text x="522" y="196" fill="#b45309" font-size="10" font-weight="bold" text-anchor="start">谁 / 何时 / 以什么身份跑（不含 skills 白名单）</text>

  <!-- 工作区文件浏览器 -->
  <rect x="40" y="238" width="880" height="40" rx="9" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.2"/>
  <text x="480" y="263" fill="#1d4ed8" font-size="11.5" font-weight="bold" text-anchor="middle">工作区文件浏览器（只读）— GET /api/v1/workspace/tree · /file（防目录穿越）</text>

  <line x1="250" y1="224" x2="430" y2="300" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#c302)"/>
  <line x1="710" y1="224" x2="530" y2="300" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#c302)"/>

  <rect x="150" y="302" width="660" height="42" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2.2"/>
  <text x="480" y="322" fill="#15803d" font-size="11" font-weight="bold" text-anchor="middle">两类资源都汇到"写文件进目录 → register(file)"</text>
  <text x="480" y="338" fill="#166534" font-size="9.5" text-anchor="middle">复用 29 节：SkillRegistry / ProfileRegistry / AgentScheduler + WorkspaceWatcher 实时监听</text>
</svg>
