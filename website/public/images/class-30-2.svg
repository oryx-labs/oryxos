<svg viewBox="0 0 960 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="960" height="360" fill="#ffffff"/>
  <defs>
    <marker id="c302" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="480" y="30" fill="#0f172a" font-size="15" font-weight="bold" text-anchor="middle">一类资源 Agent（一个目录）+ 一个工作区文件浏览器 —— 两条录入殊途同归</text>

  <!-- Agent 端点卡 -->
  <rect x="40" y="48" width="480" height="176" rx="11" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.4"/>
  <text x="280" y="72" fill="#b45309" font-size="13" font-weight="bold" text-anchor="middle">Agent（一个目录）— /api/v1/agents</text>
  <text x="62" y="98" fill="#92400e" font-size="10.5" text-anchor="start">POST /agents — 上传一个 Agent 目录（AGENT.md [+ scripts/ · skills/]）</text>
  <text x="62" y="120" fill="#92400e" font-size="10.5" text-anchor="start">GET /agents · /{name} — 查 Agent 列表 / 详情</text>
  <text x="62" y="142" fill="#92400e" font-size="10.5" text-anchor="start">PUT /{name}（改 schedules 先注销）· DELETE（整个目录归档）</text>
  <text x="62" y="164" fill="#92400e" font-size="10.5" text-anchor="start">POST /agents/generate — 一句话 → AGENT.md 草稿</text>
  <text x="62" y="186" fill="#92400e" font-size="10.5" text-anchor="start">POST /{name}/invoke — 26 节无状态调用（不变）</text>
  <text x="280" y="212" fill="#b45309" font-size="10" font-weight="bold" text-anchor="middle">一个目录 = 一个自足的 Agent（profile 就是 frontmatter）</text>

  <!-- 工作区文件浏览器卡 -->
  <rect x="540" y="48" width="380" height="176" rx="11" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.4"/>
  <text x="730" y="72" fill="#1d4ed8" font-size="13" font-weight="bold" text-anchor="middle">工作区文件浏览器（只读）</text>
  <text x="562" y="98" fill="#1e40af" font-size="10.5" text-anchor="start">GET /workspace/tree</text>
  <text x="562" y="118" fill="#1e40af" font-size="10" text-anchor="start">　列 .oryxos/agents/ 目录树</text>
  <text x="562" y="142" fill="#1e40af" font-size="10.5" text-anchor="start">GET /workspace/file?path=</text>
  <text x="562" y="162" fill="#1e40af" font-size="10" text-anchor="start">　读文件内容（防目录穿越）</text>
  <text x="730" y="196" fill="#1d4ed8" font-size="10" font-weight="bold" text-anchor="middle">钻进一个 Agent 目录看</text>
  <text x="730" y="212" fill="#1d4ed8" font-size="10" font-weight="bold" text-anchor="middle">AGENT.md / scripts/ / skills/</text>

  <line x1="280" y1="224" x2="440" y2="298" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#c302)"/>
  <line x1="730" y1="224" x2="560" y2="298" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#c302)"/>

  <rect x="120" y="300" width="720" height="46" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2.2"/>
  <text x="480" y="320" fill="#15803d" font-size="11" font-weight="bold" text-anchor="middle">两条录入殊途同归：API 上传 + 手工丢目录 → WorkspaceWatcher 实时监听 → register(agentDir)</text>
  <text x="480" y="338" fill="#166534" font-size="9.5" text-anchor="middle">= AgentLoader.deriveProfile + ProfileRegistry / AgentScheduler 注册（复用 29 节，全程免重启）</text>
</svg>
