<svg viewBox="0 0 960 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="960" height="300" fill="#ffffff"/>
  <defs>
    <marker id="c302" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="480" y="34" fill="#334155" font-size="15" font-weight="bold" text-anchor="middle">五个端点，包装同一套底层能力</text>

  <!-- 5 endpoint pills -->
  <rect x="26" y="56" width="172" height="66" rx="9" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.2"/>
  <text x="112" y="82" fill="#b45309" font-size="12" font-weight="bold" text-anchor="middle">POST /generate</text>
  <text x="112" y="103" fill="#92400e" font-size="9.5" text-anchor="middle">一句话 → Skill 草稿</text>
  <text x="112" y="116" fill="#92400e" font-size="9.5" text-anchor="middle">只产草稿·不落盘</text>

  <rect x="214" y="56" width="150" height="66" rx="9" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.2"/>
  <text x="289" y="82" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">POST /agents</text>
  <text x="289" y="106" fill="#1e40af" font-size="9.5" text-anchor="middle">创建（写 Skill+注册）</text>

  <rect x="380" y="56" width="150" height="66" rx="9" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.2"/>
  <text x="455" y="82" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">GET /{name}</text>
  <text x="455" y="106" fill="#1e40af" font-size="9.5" text-anchor="middle">查看 / 列表</text>

  <rect x="546" y="56" width="150" height="66" rx="9" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.2"/>
  <text x="621" y="82" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">PUT /{name}</text>
  <text x="621" y="106" fill="#1e40af" font-size="9.5" text-anchor="middle">改 schedules 先注销</text>

  <rect x="712" y="56" width="150" height="66" rx="9" fill="#fee2e2" stroke="#ef4444" stroke-width="2.2"/>
  <text x="787" y="82" fill="#b91c1c" font-size="12" font-weight="bold" text-anchor="middle">DELETE /{name}</text>
  <text x="787" y="106" fill="#991b1b" font-size="9.5" text-anchor="middle">归档不物理删</text>

  <!-- arrows down to orchestrator -->
  <line x1="289" y1="124" x2="400" y2="164" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#c302)"/>
  <line x1="455" y1="124" x2="470" y2="164" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#c302)"/>
  <line x1="621" y1="124" x2="540" y2="164" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#c302)"/>

  <!-- orchestrator -->
  <rect x="250" y="168" width="460" height="52" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.4"/>
  <text x="480" y="199" fill="#6d28d9" font-size="13" font-weight="bold" text-anchor="middle">AgentLifecycleService（编排：写 Skill → 派生 → 注册，含回滚）</text>

  <line x1="480" y1="220" x2="480" y2="248" stroke="#94a3b8" stroke-width="2" marker-end="url(#c302)"/>

  <!-- reused 29 capability -->
  <rect x="250" y="252" width="460" height="30" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2.2"/>
  <text x="480" y="272" fill="#15803d" font-size="11" font-weight="bold" text-anchor="middle">复用 29 节：deriveProfile + ProfileRegistry + AgentScheduler</text>

  <text x="855" y="205" fill="#64748b" font-size="10" text-anchor="end">对外只有</text>
  <text x="855" y="220" fill="#64748b" font-size="10" text-anchor="end">"Agent"一个资源</text>
</svg>
