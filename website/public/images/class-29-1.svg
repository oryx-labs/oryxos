<svg viewBox="0 0 760 384" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="384" fill="#ffffff"/>
  <defs>
    <marker id="c291" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="380" y="30" fill="#0f172a" font-size="15" font-weight="bold" text-anchor="middle">两层 —— 底座 + Agent（一个目录 = 一个 Agent），才是一台跑 N 个 Agent 的 OS</text>

  <!-- Agent = 一个目录（堆叠表示 N 个独立自足的 Agent） -->
  <rect x="60" y="76" width="640" height="110" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.4" opacity="0.5"/>
  <rect x="50" y="66" width="640" height="110" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="370" y="90" fill="#b45309" font-size="14" font-weight="bold" text-anchor="middle">Agent = 一个目录　.oryxos/agents/&lt;name&gt;/</text>
  <text x="72" y="112" fill="#92400e" font-size="10.5">• AGENT.md —— frontmatter（这个 Agent 的 profile：provider·tools·schedules…）+ 正文（任务指令）</text>
  <text x="72" y="132" fill="#92400e" font-size="10.5">• skills/*.md —— 子指令（可选，read_file 按需读）　　• scripts/ —— 脚本（可选，shell 按需跑）</text>
  <text x="72" y="152" fill="#92400e" font-size="10.5">• REFERENCE.md —— 参考（可选，read_file 按需读）</text>
  <text x="370" y="170" fill="#b45309" font-size="10" font-weight="bold" text-anchor="middle">每个目录都自足、独立；N 个目录 = N 个 Agent</text>

  <!-- 底座（宽条，最底层） -->
  <rect x="50" y="230" width="640" height="96" rx="12" fill="#e2e8f0" stroke="#475569" stroke-width="2.4"/>
  <text x="370" y="258" fill="#334155" font-size="14" font-weight="bold" text-anchor="middle">底座 = 系统基础能力（16~28 节）—— 一切 Agent 共享</text>
  <text x="370" y="286" fill="#475569" font-size="11" text-anchor="middle">Provider · ReAct · Tool(read_file / shell / http_get / notify …) · Memory · Sandbox · 定时 · Web</text>
  <text x="370" y="309" fill="#64748b" font-size="10" text-anchor="middle">每个 Agent 只调用底座能力，底座一行不改</text>

  <!-- Agent 跑在底座上 -->
  <line x1="220" y1="176" x2="220" y2="228" stroke="#94a3b8" stroke-width="2" marker-end="url(#c291)"/>
  <line x1="520" y1="176" x2="520" y2="228" stroke="#94a3b8" stroke-width="2" marker-end="url(#c291)"/>

  <text x="370" y="352" fill="#0f172a" font-size="12" font-weight="bold" text-anchor="middle">类比操作系统：底座 = 内核，Agent = 一个自足的目录（像一个进程，自带一切）</text>
  <text x="370" y="374" fill="#64748b" font-size="10.5" text-anchor="middle">一个目录 = 一个 Agent；没有跨 Agent 能力库、没有 use_skill、没有全局索引</text>
</svg>
