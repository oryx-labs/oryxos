<svg viewBox="0 0 760 384" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="384" fill="#ffffff"/>
  <defs>
    <marker id="c291" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <!-- Skill：一份文件定义一个 Agent -->
  <rect x="180" y="26" width="400" height="114" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2.4"/>
  <text x="380" y="54" fill="#be185d" font-size="14" font-weight="bold" text-anchor="middle">Skill（SKILL.md）—— 一份文件，定义一个 Agent</text>
  <text x="380" y="80" fill="#db2777" font-size="10.5" text-anchor="middle">frontmatter：name · provider · tools · notify_channels · schedules</text>
  <text x="380" y="97" fill="#db2777" font-size="10.5" text-anchor="middle">（怎么跑、什么时候跑）</text>
  <text x="380" y="123" fill="#be185d" font-size="11" font-weight="bold" text-anchor="middle">正文：给 LLM 的任务指令（做什么）</text>

  <line x1="380" y1="140" x2="380" y2="178" stroke="#94a3b8" stroke-width="2" marker-end="url(#c291)"/>
  <text x="398" y="163" fill="#475569" font-size="10.5" text-anchor="start">deriveProfile（自动派生，无需手写 Profile）</text>

  <!-- Profile：派生的底座值对象 -->
  <rect x="230" y="182" width="300" height="66" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.4"/>
  <text x="380" y="210" fill="#1d4ed8" font-size="13" font-weight="bold" text-anchor="middle">Profile（底座内部值对象）</text>
  <text x="380" y="232" fill="#1e40af" font-size="10.5" text-anchor="middle">由 Skill 派生 = Skill 与底座之间的桥</text>

  <line x1="380" y1="248" x2="380" y2="286" stroke="#94a3b8" stroke-width="2" marker-end="url(#c291)"/>
  <text x="398" y="271" fill="#475569" font-size="10.5" text-anchor="start">注册（复用启动时同一套校验）</text>

  <!-- Agent：已注册、自己跑 -->
  <rect x="248" y="290" width="264" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="380" y="316" fill="#b45309" font-size="14" font-weight="bold" text-anchor="middle">一个已注册、到点自己跑的 Agent</text>
  <text x="380" y="337" fill="#92400e" font-size="10" text-anchor="middle">ProfileRegistry + AgentScheduler</text>

  <text x="380" y="374" fill="#64748b" font-size="11.5" text-anchor="middle">类比操作系统：底座（16~28 节）是 OS，Skill 就是跑在上面的"可执行文件"</text>
</svg>
