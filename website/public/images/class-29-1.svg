<svg viewBox="0 0 820 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="340" fill="#ffffff"/>
  <defs>
    <marker id="c291" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="80" y="50" width="270" height="120" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2.4"/>
  <text x="215" y="80" fill="#be185d" font-size="14" font-weight="bold" text-anchor="middle">Skill（SKILL.md）</text>
  <text x="215" y="105" fill="#db2777" font-size="11" text-anchor="middle">这个 Agent 做什么、什么时候该做</text>
  <text x="215" y="126" fill="#db2777" font-size="10" text-anchor="middle">frontmatter + 任务说明正文</text>
  <text x="215" y="150" fill="#be185d" font-size="10.5" font-weight="bold" text-anchor="middle">= Agent 的定义本体</text>
  <text x="410" y="118" fill="#475569" font-size="30" font-weight="bold" text-anchor="middle">+</text>
  <rect x="470" y="50" width="270" height="120" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.4"/>
  <text x="605" y="80" fill="#1d4ed8" font-size="14" font-weight="bold" text-anchor="middle">Profile（YAML）</text>
  <text x="605" y="105" fill="#1e40af" font-size="11" text-anchor="middle">这个 Agent 怎么跑起来</text>
  <text x="605" y="126" fill="#1e40af" font-size="10" text-anchor="middle">provider · tools · notify_channels · schedules</text>
  <text x="605" y="150" fill="#1d4ed8" font-size="10.5" font-weight="bold" text-anchor="middle">= 底座提供的运行时绑定</text>
  <line x1="410" y1="180" x2="410" y2="208" stroke="#94a3b8" stroke-width="2" marker-end="url(#c291)"/>
  <rect x="255" y="210" width="310" height="70" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="410" y="240" fill="#b45309" font-size="15" font-weight="bold" text-anchor="middle">一个完整的业务 Agent</text>
  <text x="410" y="262" fill="#92400e" font-size="10.5" text-anchor="middle">没绑 Skill 的 Profile 只是一个通用助手骨架</text>
  <text x="410" y="316" fill="#64748b" font-size="11.5" text-anchor="middle">类比操作系统：底座（1~28 节）是 OS，Skill 是"可执行文件"——OS 本身不是任何一个程序</text>
</svg>
