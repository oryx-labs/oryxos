<svg viewBox="0 0 760 384" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="384" fill="#ffffff"/>
  <defs>
    <marker id="c291" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="380" y="30" fill="#0f172a" font-size="15" font-weight="bold" text-anchor="middle">底座 / Agent / Skill —— 三层分清，才是一台跑 N 个 Agent 的 OS</text>

  <!-- Skill：可复用能力（右侧，堆叠表示可被多个 Agent 复用） -->
  <rect x="470" y="70" width="256" height="96" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="1.6" opacity="0.55"/>
  <rect x="462" y="62" width="256" height="96" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2.4"/>
  <text x="590" y="88" fill="#be185d" font-size="13" font-weight="bold" text-anchor="middle">Skill = 可复用能力</text>
  <text x="590" y="108" fill="#db2777" font-size="10" text-anchor="middle">（Anthropic Agent Skills 形态）</text>
  <text x="590" y="127" fill="#db2777" font-size="10" text-anchor="middle">SKILL.md（name+description+正文）</text>
  <text x="590" y="143" fill="#db2777" font-size="10" text-anchor="middle">+ scripts/ · REFERENCE.md</text>

  <!-- Agent = Profile（左侧） -->
  <rect x="42" y="66" width="330" height="92" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="207" y="92" fill="#b45309" font-size="14" font-weight="bold" text-anchor="middle">Agent = 一份 Profile</text>
  <text x="207" y="114" fill="#92400e" font-size="10.5" text-anchor="middle">identity · provider · tools · notify · schedules</text>
  <text x="207" y="134" fill="#92400e" font-size="11" font-weight="bold" text-anchor="middle">谁 / 何时 / 以什么身份跑</text>
  <text x="207" y="151" fill="#92400e" font-size="9.5" text-anchor="middle">面前摆着全部已装能力，按需挑</text>

  <!-- use_skill 按需加载 -->
  <line x1="372" y1="108" x2="456" y2="108" stroke="#94a3b8" stroke-width="2" marker-end="url(#c291)"/>
  <text x="414" y="100" fill="#475569" font-size="10" text-anchor="middle">use_skill</text>
  <text x="414" y="123" fill="#475569" font-size="9.5" text-anchor="middle">按需加载</text>

  <!-- 底座（宽条，最底层） -->
  <rect x="42" y="212" width="676" height="96" rx="12" fill="#e2e8f0" stroke="#475569" stroke-width="2.4"/>
  <text x="380" y="240" fill="#334155" font-size="14" font-weight="bold" text-anchor="middle">底座（内核，16~28 节）—— 一切 Agent 共享的运行时能力</text>
  <text x="380" y="268" fill="#475569" font-size="11" text-anchor="middle">Provider · ReAct · Tool · Memory · Sandbox · 定时 · Web Service</text>
  <text x="380" y="291" fill="#64748b" font-size="10" text-anchor="middle">Agent 与 Skill 都跑在它之上，一行不改</text>

  <!-- Agent/Skill 跑在底座上 -->
  <line x1="207" y1="158" x2="207" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#c291)"/>
  <line x1="590" y1="166" x2="590" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#c291)"/>

  <text x="380" y="340" fill="#0f172a" font-size="12" font-weight="bold" text-anchor="middle">类比操作系统：底座 = 内核，Agent = 进程，Skill = 可被任意进程加载的库</text>
  <text x="380" y="366" fill="#64748b" font-size="10.5" text-anchor="middle">Skill ≠ Agent：一个能力被 N 个 Agent 复用；定时（schedules）属于 Agent，不属于能力</text>
</svg>
