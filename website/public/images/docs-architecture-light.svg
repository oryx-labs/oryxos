<svg viewBox="0 0 1080 780" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="1080" height="780" fill="#ffffff"/>
  <defs>
    <marker id="dag" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="dap" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#a855f7"/></marker>
    <marker id="dab" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3b82f6"/></marker>
    <marker id="dapk" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#db2777"/></marker>
  </defs>

  <!-- Title -->
  <text x="540" y="34" fill="#1e293b" font-size="18" font-weight="bold" text-anchor="middle">OryxOS — 整体架构</text>

  <!-- ════════ EXTERNAL: LLM Providers (top-left) ════════ -->
  <rect x="24" y="56" width="196" height="140" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5,3"/>
  <text x="122" y="76" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">LLM PROVIDERS</text>
  <rect x="38" y="84" width="168" height="26" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="122" y="101" fill="#334155" font-size="10" text-anchor="middle">DeepSeek · Qwen · Kimi</text>
  <rect x="38" y="116" width="168" height="26" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="122" y="133" fill="#334155" font-size="10" text-anchor="middle">OpenAI · Anthropic</text>
  <rect x="38" y="148" width="168" height="26" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="122" y="165" fill="#334155" font-size="10" text-anchor="middle">Ollama (local)</text>
  <text x="122" y="192" fill="#94a3b8" font-size="9" text-anchor="middle">Spring AI Alibaba</text>

  <!-- ════════ EXTERNAL: MCP Servers (top-right) ════════ -->
  <rect x="860" y="56" width="196" height="140" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5,3"/>
  <text x="958" y="76" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">MCP SERVERS</text>
  <rect x="874" y="84" width="168" height="26" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="958" y="101" fill="#334155" font-size="10" text-anchor="middle">github-mcp · news-mcp</text>
  <rect x="874" y="116" width="168" height="26" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="958" y="133" fill="#334155" font-size="10" text-anchor="middle">Custom MCP servers</text>
  <rect x="874" y="148" width="168" height="26" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="958" y="165" fill="#334155" font-size="10" text-anchor="middle">SKILL.md（零代码）</text>
  <text x="958" y="192" fill="#94a3b8" font-size="9" text-anchor="middle">MCP JSON-RPC 协议</text>

  <!-- ════════ EXTERNAL: Notify Targets (right, below MCP) ════════ -->
  <rect x="860" y="210" width="196" height="96" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5,3"/>
  <text x="958" y="230" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">NOTIFY TARGETS</text>
  <rect x="874" y="238" width="168" height="26" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="958" y="255" fill="#334155" font-size="10" text-anchor="middle">企业微信 · 飞书 · 钉钉</text>
  <text x="958" y="292" fill="#94a3b8" font-size="9" text-anchor="middle">Generic Webhook</text>

  <!-- ════════ MAIN ORYXOS BOX ════════ -->
  <rect x="300" y="56" width="480" height="548" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="2.4"/>
  <text x="540" y="80" fill="#b45309" font-size="14" font-weight="bold" text-anchor="middle">OryxOS</text>
  <text x="540" y="96" fill="#94a3b8" font-size="9" text-anchor="middle">Spring Boot 3.x · JDK 21 · Single JAR</text>

  <!-- ── Band 1: Channel / Trigger Layer ── -->
  <rect x="316" y="108" width="448" height="66" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="332" y="126" fill="#1d4ed8" font-size="11" font-weight="bold">Channel / Trigger Layer</text>
  <rect x="316" y="132" width="140" height="30" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="386" y="151" fill="#1d4ed8" font-size="10" text-anchor="middle">CLI · 人推</text>
  <rect x="470" y="132" width="140" height="30" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="540" y="151" fill="#1d4ed8" font-size="10" text-anchor="middle">REST API · 人推</text>
  <rect x="624" y="132" width="140" height="30" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="694" y="151" fill="#1d4ed8" font-size="10" text-anchor="middle">Scheduler · 钟推</text>

  <line x1="540" y1="174" x2="540" y2="196" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#dag)"/>

  <!-- ── Band 2: Agent Layer ── -->
  <rect x="316" y="196" width="448" height="58" rx="8" fill="#fdf2f8" stroke="#db2777" stroke-width="1.8"/>
  <text x="332" y="214" fill="#be185d" font-size="11" font-weight="bold">Agent Layer  ·  一个业务 Agent = Skill + Profile</text>
  <rect x="316" y="222" width="210" height="26" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="1.4"/>
  <text x="421" y="240" fill="#be185d" font-size="10" text-anchor="middle">Skill · 做什么（SKILL.md）</text>
  <rect x="554" y="222" width="210" height="26" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="1.4"/>
  <text x="659" y="240" fill="#be185d" font-size="10" text-anchor="middle">Profile · 怎么跑（YAML）</text>

  <line x1="540" y1="254" x2="540" y2="276" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#dag)"/>

  <!-- ── Band 3: Engine Layer ── -->
  <rect x="316" y="276" width="448" height="88" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="332" y="295" fill="#b45309" font-size="11" font-weight="bold">Engine Layer  ·  oryxos-core</text>
  <rect x="316" y="300" width="138" height="52" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.4"/>
  <text x="385" y="320" fill="#b45309" font-size="10" font-weight="bold" text-anchor="middle">ReActLoop</text>
  <text x="385" y="336" fill="#92400e" font-size="8.5" text-anchor="middle">Reason + Act</text>
  <text x="385" y="348" fill="#92400e" font-size="8.5" text-anchor="middle">max 10 iterations</text>
  <rect x="466" y="300" width="138" height="52" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.4"/>
  <text x="535" y="320" fill="#b45309" font-size="10" font-weight="bold" text-anchor="middle">PromptBuilder</text>
  <text x="535" y="336" fill="#92400e" font-size="8.5" text-anchor="middle">system + memory</text>
  <text x="535" y="348" fill="#92400e" font-size="8.5" text-anchor="middle">+ history + tools</text>
  <rect x="616" y="300" width="148" height="52" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.4"/>
  <text x="690" y="320" fill="#b45309" font-size="10" font-weight="bold" text-anchor="middle">ToolExecutor</text>
  <text x="690" y="336" fill="#92400e" font-size="8.5" text-anchor="middle">Sandbox check</text>
  <text x="690" y="348" fill="#92400e" font-size="8.5" text-anchor="middle">+ audit write</text>

  <line x1="540" y1="364" x2="540" y2="386" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#dag)"/>

  <!-- ── Band 4: Capability Layer ── -->
  <rect x="316" y="386" width="448" height="100" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="1.8"/>
  <text x="332" y="405" fill="#7c3aed" font-size="11" font-weight="bold">Capability Layer</text>
  <rect x="316" y="412" width="100" height="64" rx="6" fill="#ede9fe" stroke="#a855f7" stroke-width="1.4"/>
  <text x="366" y="432" fill="#7c3aed" font-size="10" font-weight="bold" text-anchor="middle">Provider</text>
  <text x="366" y="448" fill="#6b21a8" font-size="8" text-anchor="middle">LLM 路由</text>
  <text x="366" y="462" fill="#9333ea" font-size="7.5" text-anchor="middle">显式映射</text>
  <rect x="432" y="412" width="100" height="64" rx="6" fill="#ede9fe" stroke="#a855f7" stroke-width="1.4"/>
  <text x="482" y="432" fill="#7c3aed" font-size="10" font-weight="bold" text-anchor="middle">Memory</text>
  <text x="482" y="448" fill="#6b21a8" font-size="8" text-anchor="middle">会话+长期</text>
  <text x="482" y="462" fill="#9333ea" font-size="7.5" text-anchor="middle">核心/归档分区</text>
  <rect x="548" y="412" width="100" height="64" rx="6" fill="#ede9fe" stroke="#a855f7" stroke-width="1.4"/>
  <text x="598" y="432" fill="#7c3aed" font-size="10" font-weight="bold" text-anchor="middle">Tool</text>
  <text x="598" y="448" fill="#6b21a8" font-size="8" text-anchor="middle">内置+MCP</text>
  <text x="598" y="462" fill="#9333ea" font-size="7.5" text-anchor="middle">+ Sandbox</text>
  <rect x="664" y="412" width="100" height="64" rx="6" fill="#ede9fe" stroke="#a855f7" stroke-width="1.4"/>
  <text x="714" y="432" fill="#7c3aed" font-size="10" font-weight="bold" text-anchor="middle">Notify</text>
  <text x="714" y="448" fill="#6b21a8" font-size="8" text-anchor="middle">出站推送</text>
  <text x="714" y="462" fill="#9333ea" font-size="7.5" text-anchor="middle">NotifyTools</text>

  <line x1="540" y1="486" x2="540" y2="508" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#dag)"/>

  <!-- ── Band 5: Storage Layer ── -->
  <rect x="316" y="508" width="448" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.8"/>
  <text x="332" y="527" fill="#15803d" font-size="11" font-weight="bold">Storage Layer  ·  oryxos-storage</text>
  <rect x="316" y="534" width="216" height="42" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.4"/>
  <text x="424" y="552" fill="#15803d" font-size="10" font-weight="bold" text-anchor="middle">SQLite (oryxos.db)</text>
  <text x="424" y="567" fill="#166534" font-size="8.5" text-anchor="middle">sessions · tool_invocations · llm_calls</text>
  <rect x="548" y="534" width="216" height="42" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.4"/>
  <text x="656" y="552" fill="#15803d" font-size="10" font-weight="bold" text-anchor="middle">Filesystem (.oryxos/)</text>
  <text x="656" y="567" fill="#166534" font-size="8.5" text-anchor="middle">profiles · MEMORY.md · skills</text>

  <!-- ════════ EXTERNAL CONNECTIONS ════════ -->
  <line x1="220" y1="126" x2="300" y2="436" stroke="#a855f7" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#dap)"/>
  <text x="216" y="280" fill="#a855f7" font-size="9" text-anchor="end">API</text>

  <line x1="860" y1="126" x2="780" y2="428" stroke="#a855f7" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#dap)"/>
  <text x="864" y="280" fill="#a855f7" font-size="9">JSON-RPC</text>

  <line x1="860" y1="265" x2="780" y2="452" stroke="#db2777" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#dapk)"/>
  <text x="864" y="360" fill="#db2777" font-size="9">Webhook</text>

  <!-- ════════ USERS / CLIENTS ════════ -->
  <rect x="24" y="624" width="196" height="56" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5,3"/>
  <text x="122" y="646" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">USERS</text>
  <text x="122" y="664" fill="#334155" font-size="10" text-anchor="middle">oryxos chat (CLI)</text>

  <rect x="860" y="624" width="196" height="56" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5,3"/>
  <text x="958" y="646" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">BUSINESS SYSTEMS</text>
  <text x="958" y="664" fill="#334155" font-size="10" text-anchor="middle">HTTP POST /api/v1/…</text>

  <line x1="122" y1="624" x2="300" y2="147" stroke="#3b82f6" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#dab)"/>
  <line x1="958" y1="624" x2="780" y2="147" stroke="#3b82f6" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#dab)"/>

  <!-- ════════ Legend ════════ -->
  <rect x="300" y="612" width="480" height="78" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.4"/>
  <text x="540" y="632" fill="#94a3b8" font-size="9" text-anchor="middle" letter-spacing="1">图例</text>
  <text x="540" y="653" fill="#475569" font-size="10" text-anchor="middle">蓝 = 触发入口　粉 = Agent 定义　橙 = 引擎　紫 = 能力　绿 = 存储　灰 = 外部依赖</text>
  <text x="540" y="674" fill="#64748b" font-size="10" text-anchor="middle">实线 = 内部调用　　虚线 = 外部调用</text>
</svg>
