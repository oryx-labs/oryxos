<svg viewBox="0 0 820 440" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="440" fill="#ffffff"/>
  <defs>
    <marker id="gy" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="gr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22c55e"/></marker>
    <marker id="rd" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="290" y="20" width="260" height="46" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="420" y="48" fill="#4338ca" font-size="13" font-weight="bold" text-anchor="middle">读 Profile 的 schedules 配置</text>
  <line x1="420" y1="66" x2="420" y2="92" stroke="#94a3b8" stroke-width="2" marker-end="url(#gy)"/>
  <rect x="260" y="94" width="320" height="56" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="420" y="116" fill="#6d28d9" font-size="14" font-weight="bold" text-anchor="middle">按 cron 动态注册</text>
  <text x="420" y="136" fill="#7c3aed" font-size="11" text-anchor="middle">ThreadPoolTaskScheduler + CronTrigger</text>
  <line x1="420" y1="150" x2="420" y2="176" stroke="#94a3b8" stroke-width="2" marker-end="url(#gy)"/>
  <rect x="300" y="178" width="240" height="44" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="420" y="204" fill="#b45309" font-size="14" font-weight="bold" text-anchor="middle">到点，触发一次</text>
  <line x1="420" y1="222" x2="420" y2="246" stroke="#94a3b8" stroke-width="2" marker-end="url(#gy)"/>
  <polygon points="420,248 545,286 420,324 295,286" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="420" y="291" fill="#b45309" font-size="13" font-weight="bold" text-anchor="middle">拿到本地锁？</text>
  <line x1="545" y1="286" x2="653" y2="286" stroke="#22c55e" stroke-width="2" marker-end="url(#gr)"/>
  <text x="597" y="277" fill="#15803d" font-size="12" font-weight="bold" text-anchor="middle">是</text>
  <rect x="655" y="266" width="150" height="44" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="292" fill="#15803d" font-size="11" text-anchor="middle">AgentService.process()</text>
  <line x1="295" y1="286" x2="192" y2="286" stroke="#94a3b8" stroke-width="2" marker-end="url(#rd)"/>
  <text x="242" y="277" fill="#64748b" font-size="12" font-weight="bold" text-anchor="middle">否</text>
  <rect x="20" y="262" width="170" height="48" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.8"/>
  <text x="105" y="284" fill="#475569" font-size="13" font-weight="bold" text-anchor="middle">跳过本次</text>
  <text x="105" y="301" fill="#64748b" font-size="10" text-anchor="middle">上一次还没跑完，记日志</text>
  <path d="M730,310 L730,326 L610,326 L610,342" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#gr)"/>
  <rect x="470" y="344" width="280" height="54" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="610" y="366" fill="#15803d" font-size="13" font-weight="bold" text-anchor="middle">写审计 + 释放本地锁</text>
  <text x="610" y="384" fill="#15803d" font-size="10" text-anchor="middle">llm_calls / tool_invocations</text>
  <text x="420" y="426" fill="#64748b" font-size="12" text-anchor="middle">本地锁只解决单实例内重叠；多实例归属协调是 Phase 2 的事</text>
</svg>
