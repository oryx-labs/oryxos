<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="300" fill="#ffffff"/>
  <defs>
    <marker id="ntf2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="270" y="20" width="280" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="410" y="43" fill="#4338ca" font-size="14" font-weight="bold" text-anchor="middle">NotifyTools</text>
  <text x="410" y="61" fill="#4338ca" font-size="11" text-anchor="middle">.notify(content, channel)</text>
  <line x1="410" y1="70" x2="410" y2="96" stroke="#94a3b8" stroke-width="2" marker-end="url(#ntf2)"/>
  <rect x="185" y="98" width="450" height="58" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="410" y="124" fill="#b45309" font-size="15" font-weight="bold" text-anchor="middle">NotifyChannelAdapter（接口）</text>
  <text x="410" y="144" fill="#92400e" font-size="11" text-anchor="middle">表达"送到某个通知目标"，不携带具体渠道细节</text>
  <line x1="410" y1="156" x2="410" y2="176" stroke="#f59e0b" stroke-width="2"/>
  <line x1="200" y1="176" x2="620" y2="176" stroke="#f59e0b" stroke-width="2"/>
  <line x1="200" y1="176" x2="200" y2="204" stroke="#f59e0b" stroke-width="2" marker-end="url(#ntf2)"/>
  <line x1="620" y1="176" x2="620" y2="204" stroke="#f59e0b" stroke-width="2" marker-end="url(#ntf2)"/>
  <rect x="60" y="206" width="280" height="52" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="228" fill="#1d4ed8" font-size="13" font-weight="bold" text-anchor="middle">当前：WebhookNotifyAdapter</text>
  <text x="200" y="246" fill="#1e40af" font-size="10" text-anchor="middle">通用 HTTP webhook，核心阶段唯一实现</text>
  <rect x="480" y="206" width="280" height="52" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="620" y="228" fill="#15803d" font-size="13" font-weight="bold" text-anchor="middle">未来：企业微信/飞书/钉钉专用</text>
  <text x="620" y="246" fill="#166534" font-size="10" text-anchor="middle">新增实现类，接口不变（扩展阶段）</text>
  <text x="410" y="284" fill="#64748b" font-size="12" text-anchor="middle">只要接口不变，webhook 换成专用 Adapter，NotifyTools 一行不用改</text>
</svg>
