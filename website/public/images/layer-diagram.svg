<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 600" width="760" height="600">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 Z" fill="#4b5563"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="600" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="380" y="34" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#9ca3af" text-anchor="middle" letter-spacing="1.5">OryxOS — Five-Layer Architecture</text>

  <!-- ═══ Layer 1: Channel / Trigger Layer ═══ -->
  <rect x="40" y="52" width="680" height="76" rx="8" fill="#0f1729" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="74" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#3b82f6" font-weight="bold">Channel / Trigger Layer</text>
  <rect x="56" y="82" width="208" height="36" rx="6" fill="#1e2d4a" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="160" y="98" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#93c5fd" text-anchor="middle">CLI · 人推</text>
  <text x="160" y="112" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#6b7280" text-anchor="middle">oryxos-channel-cli</text>
  <rect x="276" y="82" width="208" height="36" rx="6" fill="#1e2d4a" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="380" y="98" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#93c5fd" text-anchor="middle">REST API · 人推</text>
  <text x="380" y="112" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#6b7280" text-anchor="middle">oryxos-web</text>
  <rect x="496" y="82" width="208" height="36" rx="6" fill="#1e2d4a" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="600" y="98" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#93c5fd" text-anchor="middle">Scheduler · 钟推</text>
  <text x="600" y="112" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#6b7280" text-anchor="middle">AgentScheduler · cron</text>

  <line x1="380" y1="128" x2="380" y2="150" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ Layer 2: Agent Layer (NEW) ═══ -->
  <rect x="40" y="150" width="680" height="70" rx="8" fill="#1f0d18" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="172" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#ec4899" font-weight="bold">Agent Layer  ·  一个业务 Agent = 一个目录（AGENT.md）</text>
  <rect x="56" y="180" width="318" height="32" rx="6" fill="#33121f" stroke="#ec4899" stroke-width="1"/>
  <text x="215" y="200" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#f9a8d4" text-anchor="middle">正文 · 做什么（AGENT.md）</text>
  <rect x="386" y="180" width="318" height="32" rx="6" fill="#33121f" stroke="#ec4899" stroke-width="1"/>
  <text x="545" y="200" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#f9a8d4" text-anchor="middle">frontmatter · 谁/何时/怎么跑</text>

  <line x1="380" y1="220" x2="380" y2="242" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ Layer 3: Engine Layer ═══ -->
  <rect x="40" y="242" width="680" height="84" rx="8" fill="#1a0f00" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="264" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#f97316" font-weight="bold">Engine Layer  ·  oryxos-core</text>
  <rect x="56" y="272" width="192" height="42" rx="6" fill="#2d1700" stroke="#f97316" stroke-width="1"/>
  <text x="152" y="289" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#fb923c" text-anchor="middle" font-weight="bold">ReActLoop</text>
  <text x="152" y="305" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#6b7280" text-anchor="middle">drives each iteration</text>
  <rect x="264" y="272" width="192" height="42" rx="6" fill="#2d1700" stroke="#f97316" stroke-width="1"/>
  <text x="360" y="289" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#fb923c" text-anchor="middle" font-weight="bold">PromptBuilder</text>
  <text x="360" y="305" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#6b7280" text-anchor="middle">assembles 4-part prompt</text>
  <rect x="472" y="272" width="232" height="42" rx="6" fill="#2d1700" stroke="#f97316" stroke-width="1"/>
  <text x="588" y="289" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#fb923c" text-anchor="middle" font-weight="bold">ToolExecutor</text>
  <text x="588" y="305" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#6b7280" text-anchor="middle">sandbox check + audit write</text>

  <line x1="380" y1="326" x2="380" y2="348" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ Layer 4: Capability Layer ═══ -->
  <rect x="40" y="348" width="680" height="96" rx="8" fill="#130d1f" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="370" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#a855f7" font-weight="bold">Capability Layer</text>
  <rect x="56" y="378" width="153" height="54" rx="6" fill="#1e1030" stroke="#a855f7" stroke-width="1"/>
  <text x="132" y="396" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#c084fc" text-anchor="middle" font-weight="bold">Provider</text>
  <text x="132" y="411" font-family="'SF Mono','Fira Code',monospace" font-size="8.5" fill="#6b7280" text-anchor="middle">LLM 路由</text>
  <text x="132" y="423" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="#4b5563" text-anchor="middle">oryxos-provider</text>
  <rect x="221" y="378" width="153" height="54" rx="6" fill="#1e1030" stroke="#a855f7" stroke-width="1"/>
  <text x="297" y="396" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#c084fc" text-anchor="middle" font-weight="bold">Memory</text>
  <text x="297" y="411" font-family="'SF Mono','Fira Code',monospace" font-size="8.5" fill="#6b7280" text-anchor="middle">会话+长期</text>
  <text x="297" y="423" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="#4b5563" text-anchor="middle">oryxos-memory</text>
  <rect x="386" y="378" width="153" height="54" rx="6" fill="#1e1030" stroke="#a855f7" stroke-width="1"/>
  <text x="462" y="396" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#c084fc" text-anchor="middle" font-weight="bold">Tool</text>
  <text x="462" y="411" font-family="'SF Mono','Fira Code',monospace" font-size="8.5" fill="#6b7280" text-anchor="middle">内置+MCP+Sandbox</text>
  <text x="462" y="423" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="#4b5563" text-anchor="middle">oryxos-tool</text>
  <rect x="551" y="378" width="153" height="54" rx="6" fill="#1e1030" stroke="#a855f7" stroke-width="1"/>
  <text x="627" y="396" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#c084fc" text-anchor="middle" font-weight="bold">Notify</text>
  <text x="627" y="411" font-family="'SF Mono','Fira Code',monospace" font-size="8.5" fill="#6b7280" text-anchor="middle">出站推送</text>
  <text x="627" y="423" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="#4b5563" text-anchor="middle">NotifyTools</text>

  <line x1="380" y1="444" x2="380" y2="466" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ Layer 5: Storage Layer ═══ -->
  <rect x="40" y="466" width="680" height="84" rx="8" fill="#0a1a10" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="488" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#22c55e" font-weight="bold">Storage Layer  ·  oryxos-storage</text>
  <rect x="56" y="496" width="316" height="42" rx="6" fill="#0f2a18" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="214" y="513" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#4ade80" text-anchor="middle" font-weight="bold">SQLite</text>
  <text x="214" y="529" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#6b7280" text-anchor="middle">sessions  ·  tool_invocations  ·  llm_calls</text>
  <rect x="388" y="496" width="316" height="42" rx="6" fill="#0f2a18" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="546" y="513" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#4ade80" text-anchor="middle" font-weight="bold">Filesystem  (.oryxos/)</text>
  <text x="546" y="529" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#6b7280" text-anchor="middle">profiles  ·  MEMORY.md  ·  skills  ·  bootstrap</text>

  <!-- Legend -->
  <text x="380" y="572" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#9ca3af" text-anchor="middle">蓝 = 触发入口　粉 = Agent 定义　橙 = 引擎　紫 = 能力　绿 = 存储</text>
</svg>
