<svg viewBox="0 0 820 330" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="330" fill="#ffffff"/>
  <defs>
    <marker id="su" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/></marker>
  </defs>
  <rect x="260" y="20" width="300" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="410" y="55" fill="#475569" font-size="14" font-weight="bold" text-anchor="middle">核心阶段：应用层白名单校验</text>
  <line x1="410" y1="80" x2="410" y2="130" stroke="#f59e0b" stroke-width="2" marker-end="url(#su)"/>
  <text x="575" y="99" fill="#b45309" font-size="12" font-weight="bold" text-anchor="start">信号一：要跑不可信代码</text>
  <text x="575" y="116" fill="#b45309" font-size="12" font-weight="bold" text-anchor="start">或要做多租户</text>
  <rect x="260" y="132" width="300" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="167" fill="#1d4ed8" font-size="14" font-weight="bold" text-anchor="middle">扩展阶段一：容器隔离</text>
  <line x1="410" y1="192" x2="410" y2="242" stroke="#f59e0b" stroke-width="2" marker-end="url(#su)"/>
  <text x="575" y="211" fill="#b45309" font-size="12" font-weight="bold" text-anchor="start">信号二：要跑完全不可信代码</text>
  <text x="575" y="228" fill="#b45309" font-size="12" font-weight="bold" text-anchor="start">或规模化多租户</text>
  <rect x="260" y="244" width="300" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="410" y="279" fill="#b45309" font-size="14" font-weight="bold" text-anchor="middle">扩展阶段二：microVM</text>
  <text x="410" y="318" fill="#64748b" font-size="12" text-anchor="middle">没有出现信号之前，不必往上升级</text>
</svg>
