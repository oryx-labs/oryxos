<svg viewBox="0 0 820 240" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="240" fill="#ffffff"/>
  <rect x="30" y="28" width="360" height="188" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="52" y="62" fill="#b45309" font-size="18" font-weight="bold">Provider 负责</text>
  <text x="52" y="98" fill="#3f3f46" font-size="15">· 挑对哪家模型</text>
  <text x="52" y="128" fill="#3f3f46" font-size="15">· 组装并发起一次 LLM 调用</text>
  <text x="52" y="158" fill="#3f3f46" font-size="15">· 把工具翻译成各家能懂的格式</text>
  <text x="52" y="188" fill="#3f3f46" font-size="15">· 记这次调用的用量 / 审计</text>
  <rect x="430" y="28" width="360" height="188" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="452" y="62" fill="#475569" font-size="18" font-weight="bold">Provider 不管</text>
  <text x="452" y="98" fill="#64748b" font-size="15">· 循环怎么转 → ReActLoop</text>
  <text x="452" y="128" fill="#64748b" font-size="15">· 工具怎么执行 → ToolExecutor</text>
  <text x="452" y="158" fill="#64748b" font-size="15">· 上下文怎么拼 → PromptBuilder</text>
  <text x="452" y="188" fill="#64748b" font-size="15">· 记忆怎么存 → MemoryService</text>
</svg>
