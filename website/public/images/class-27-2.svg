<svg viewBox="0 0 820 330" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="330" fill="#ffffff"/>
  <text x="410" y="30" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle">串联时最常见的五条缝隙——症状都在运行时，根因都在交接处</text>
  <rect x="40" y="50" width="740" height="44" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.8"/>
  <text x="60" y="77" fill="#b91c1c" font-size="11.5" font-weight="bold">① Found 0 JPA repositories</text>
  <text x="770" y="77" fill="#991b1b" font-size="10.5" text-anchor="end">跨模块扫描没显式声明 basePackages（18 节埋过的雷，这里全局引爆）</text>
  <rect x="40" y="104" width="740" height="44" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="60" y="131" fill="#b45309" font-size="11.5" font-weight="bold">② 工具被调两次</text>
  <text x="770" y="131" fill="#92400e" font-size="10.5" text-anchor="end">Spring AI 自动 tool 执行没关干净，和 ToolExecutor 各跑一遍（16 节的坑二）</text>
  <rect x="40" y="158" width="740" height="44" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="60" y="185" fill="#1d4ed8" font-size="11.5" font-weight="bold">③ session_id 口径不一</text>
  <text x="770" y="185" fill="#1e40af" font-size="10.5" text-anchor="end">cli / web 两处各自拼 id，同一个人两条历史——收敛到 SessionManager 一处生成</text>
  <rect x="40" y="212" width="740" height="44" rx="8" fill="#ede9fe" stroke="#a855f7" stroke-width="1.8"/>
  <text x="60" y="239" fill="#7c3aed" font-size="11.5" font-weight="bold">④ Bootstrap 缺失被静默跳过</text>
  <text x="770" y="239" fill="#6b21a8" font-size="10.5" text-anchor="end">SOUL.md 没建，Agent 人格悄悄丢了——ContextLoader 缺文件要告警不是跳过</text>
  <rect x="40" y="266" width="740" height="44" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.8"/>
  <text x="60" y="293" fill="#15803d" font-size="11.5" font-weight="bold">⑤ 审计链有断点</text>
  <text x="770" y="293" fill="#166534" font-size="10.5" text-anchor="end">某条失败路径漏写审计表——拿一次完整对话逐表"对账"才能发现</text>
</svg>
