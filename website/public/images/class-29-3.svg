<svg viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="320" fill="#ffffff"/>
  <defs>
    <marker id="c293" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="410" y="28" fill="#0f172a" font-size="15" font-weight="bold" text-anchor="middle">一个来源、一段注册代码 —— 一个目录 = 一个 Agent（无能力库、无 use_skill）</text>

  <!-- 顶部：两条入口都走同一段注册代码 -->
  <rect x="130" y="46" width="560" height="34" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="410" y="68" fill="#475569" font-size="11" text-anchor="middle">启动扫描　＋　运行时注册（30 节 API：register(agentDir) / remove）　—　两条入口共用同一段代码</text>

  <line x1="410" y1="80" x2="410" y2="102" stroke="#94a3b8" stroke-width="2" marker-end="url(#c293)"/>

  <!-- 一个目录 = 一个 Agent -->
  <rect x="150" y="104" width="520" height="52" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="410" y="127" fill="#b45309" font-size="13" font-weight="bold" text-anchor="middle">.oryxos/agents/&lt;name&gt;/　（一个目录 = 一个 Agent）</text>
  <text x="410" y="146" fill="#92400e" font-size="10" text-anchor="middle">AGENT.md（frontmatter=profile + 正文）+ 可选 skills/ · scripts/ · REFERENCE.md</text>

  <line x1="410" y1="156" x2="410" y2="186" stroke="#94a3b8" stroke-width="2" marker-end="url(#c293)"/>
  <text x="410" y="177" fill="#475569" font-size="10.5" text-anchor="middle">AgentLoader.deriveProfile（frontmatter → Profile，运行时与启动同一套校验）</text>

  <!-- 注册表 -->
  <rect x="150" y="188" width="520" height="52" rx="8" fill="#fde68a" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="410" y="211" fill="#92400e" font-size="13" font-weight="bold" text-anchor="middle">ProfileRegistry　+　AgentScheduler</text>
  <text x="410" y="230" fill="#b45309" font-size="10" text-anchor="middle">Agent 索引 · 有 schedules 的到点自己跑</text>

  <text x="410" y="270" fill="#4338ca" font-size="10.5" text-anchor="middle">每个 Agent 自足，只调用底座系统基础能力（read_file / shell / http_get / notify …）</text>
  <text x="410" y="296" fill="#64748b" font-size="10.5" text-anchor="middle">运行时注册与启动扫描是同一段代码 → API 建的和手工丢目录建的行为一模一样</text>
</svg>
