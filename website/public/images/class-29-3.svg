<svg viewBox="0 0 820 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="260" fill="#ffffff"/>
  <rect x="30" y="40" width="360" height="170" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="52" y="72" fill="#475569" font-size="15" font-weight="bold">现在：只在启动时注册</text>
  <text x="52" y="104" fill="#64748b" font-size="12">· ProfileRegistry 启动扫描一次建索引</text>
  <text x="52" y="132" fill="#64748b" font-size="12">· AgentScheduler 启动扫描一次注册定时</text>
  <text x="52" y="160" fill="#64748b" font-size="12">· 新增 Profile → 必须重启才可用</text>
  <text x="52" y="192" fill="#94a3b8" font-size="11">"OS 装个新程序要重启"，说不过去</text>
  <rect x="430" y="40" width="360" height="170" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="452" y="72" fill="#b45309" font-size="15" font-weight="bold">本节补上：运行时注册（内部能力）</text>
  <text x="452" y="104" fill="#92400e" font-size="12">· ProfileRegistry.register(profile)</text>
  <text x="452" y="132" fill="#92400e" font-size="12">· AgentScheduler.registerProfile(profile)</text>
  <text x="452" y="160" fill="#92400e" font-size="12">· 复用启动时同一套校验和注册逻辑</text>
  <text x="452" y="192" fill="#b45309" font-size="11" font-weight="bold">30 节 AgentLifecycleService 编排调用它们</text>
  <text x="410" y="240" fill="#64748b" font-size="11.5" text-anchor="middle">这节先把两个方法立好、单独验证；HTTP 入口是 30 节的事——能力和入口分两步走，各自都好验</text>
</svg>
