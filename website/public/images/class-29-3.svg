<svg viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="320" fill="#ffffff"/>
  <defs>
    <marker id="c293" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="410" y="28" fill="#0f172a" font-size="15" font-weight="bold" text-anchor="middle">两个来源、两个注册表 —— Skill 是能力，Agent 是 Profile，别混</text>

  <!-- 顶部：两条入口都走同一段注册代码 -->
  <rect x="120" y="46" width="580" height="34" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="410" y="68" fill="#475569" font-size="11" text-anchor="middle">启动扫描　＋　运行时注册（30 节 API：register / remove）　—　两条入口共用同一段注册代码</text>

  <!-- 左列：Skill 能力 -->
  <rect x="40" y="104" width="330" height="40" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2.2"/>
  <text x="205" y="129" fill="#be185d" font-size="12" font-weight="bold" text-anchor="middle">.oryxos/skills/&lt;name&gt;/（能力目录）</text>

  <line x1="205" y1="144" x2="205" y2="176" stroke="#94a3b8" stroke-width="2" marker-end="url(#c293)"/>
  <text x="205" y="165" fill="#475569" font-size="10" text-anchor="middle">SkillLoader 解析</text>

  <rect x="40" y="180" width="330" height="52" rx="8" fill="#fbcfe8" stroke="#db2777" stroke-width="2.6"/>
  <text x="205" y="204" fill="#9d174d" font-size="13" font-weight="bold" text-anchor="middle">SkillRegistry（能力库）</text>
  <text x="205" y="223" fill="#be185d" font-size="10" text-anchor="middle">全体 Agent 共享 · 不产生任何 Agent</text>

  <!-- 右列：Agent Profile -->
  <rect x="450" y="104" width="330" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.2"/>
  <text x="615" y="129" fill="#b45309" font-size="12" font-weight="bold" text-anchor="middle">.oryxos/profiles/&lt;name&gt;.yaml（Agent）</text>

  <line x1="615" y1="144" x2="615" y2="176" stroke="#94a3b8" stroke-width="2" marker-end="url(#c293)"/>
  <text x="615" y="165" fill="#475569" font-size="10" text-anchor="middle">ProfileLoader 加载（同一套校验）</text>

  <rect x="450" y="180" width="330" height="52" rx="8" fill="#fde68a" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="615" y="203" fill="#92400e" font-size="13" font-weight="bold" text-anchor="middle">ProfileRegistry　+　AgentScheduler</text>
  <text x="615" y="222" fill="#b45309" font-size="10" text-anchor="middle">Agent 索引 · 有 schedules 的到点自己跑</text>

  <!-- 底部：运行时用 use_skill 把能力接给 Agent -->
  <line x1="205" y1="232" x2="205" y2="266" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="615" y1="232" x2="615" y2="266" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="205" y1="266" x2="595" y2="266" stroke="#94a3b8" stroke-width="2" marker-end="url(#c293)"/>
  <rect x="250" y="252" width="320" height="28" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="410" y="271" fill="#4338ca" font-size="10.5" text-anchor="middle">运行时：Agent 在 ReAct 里 use_skill 把能力按需加载进来</text>

  <text x="410" y="304" fill="#64748b" font-size="10.5" text-anchor="middle">运行时注册与启动扫描是同一段代码 → API 建的和文件建的行为一模一样</text>
</svg>
