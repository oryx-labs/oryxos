<svg viewBox="0 0 700 650" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="650" fill="#ffffff"/>
  <defs>
    <marker id="m25c" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="250" y="20" width="200" height="50" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="350" y="50" fill="#6d28d9" font-size="12" font-weight="bold" text-anchor="middle">模型生成 shell 命令</text>
  <line x1="350" y1="70" x2="350" y2="108" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#m25c)"/>
  <rect x="200" y="110" width="300" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="135" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">ShellTools.execute()</text>
  <text x="350" y="153" fill="#1e40af" font-size="10" text-anchor="middle">先调用 sandbox.enforce(cmd)</text>
  <line x1="350" y1="170" x2="350" y2="198" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#m25c)"/>
  <polygon points="350,200 470,240 350,280 230,240" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="350" y="235" fill="#475569" font-size="9.5" text-anchor="middle">命令在 shell.allowed_commands</text>
  <text x="350" y="250" fill="#475569" font-size="9.5" text-anchor="middle">白名单里？</text>
  <line x1="230" y1="240" x2="164" y2="318" stroke="#ef4444" stroke-width="1.8" marker-end="url(#m25c)"/>
  <text x="190" y="285" fill="#dc2626" font-size="11">否</text>
  <rect x="40" y="320" width="240" height="50" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="160" y="350" fill="#b91c1c" font-size="12" font-weight="bold" text-anchor="middle">抛 SandboxViolationException</text>
  <line x1="470" y1="240" x2="540" y2="318" stroke="#22c55e" stroke-width="1.8" marker-end="url(#m25c)"/>
  <text x="500" y="285" fill="#16a34a" font-size="11">是</text>
  <rect x="420" y="320" width="240" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="540" y="350" fill="#15803d" font-size="12" font-weight="bold" text-anchor="middle">执行真正的 shell 命令</text>
  <line x1="160" y1="370" x2="280" y2="408" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#m25c)"/>
  <line x1="540" y1="370" x2="420" y2="408" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#m25c)"/>
  <rect x="250" y="410" width="200" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="350" y="440" fill="#475569" font-size="12" font-weight="bold" text-anchor="middle">ToolExecutor 捕获结果</text>
  <line x1="350" y1="460" x2="350" y2="488" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#m25c)"/>
  <rect x="170" y="490" width="360" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="350" y="515" fill="#b45309" font-size="12" font-weight="bold" text-anchor="middle">写入 tool_invocations</text>
  <text x="350" y="533" fill="#92400e" font-size="10" text-anchor="middle">(success=false/true, error_message)</text>
  <line x1="350" y1="550" x2="350" y2="578" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#m25c)"/>
  <rect x="150" y="580" width="400" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6"/>
  <text x="350" y="600" fill="#475569" font-size="11" text-anchor="middle">结果追加回对话历史</text>
  <text x="350" y="618" fill="#64748b" font-size="10" text-anchor="middle">模型看到失败原因，下一轮可能调整策略</text>
</svg>
