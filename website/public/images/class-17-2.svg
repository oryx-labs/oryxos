<svg viewBox="0 0 820 240" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="240" fill="#ffffff"/>
  <rect x="30" y="28" width="360" height="188" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="52" y="62" fill="#b45309" font-size="18" font-weight="bold">ReActLoop 负责</text>
  <text x="52" y="100" fill="#3f3f46" font-size="15">· 一圈圈转（调度）</text>
  <text x="52" y="132" fill="#3f3f46" font-size="15">· 判断这轮该不该停</text>
  <text x="52" y="164" fill="#3f3f46" font-size="15">· 把响应和结果累积到 Session</text>
  <rect x="430" y="28" width="360" height="188" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="452" y="62" fill="#475569" font-size="18" font-weight="bold">交给别人</text>
  <text x="452" y="100" fill="#64748b" font-size="15">· 拼上下文 → <tspan fill="#7c3aed" font-weight="bold">PromptBuilder</tspan></text>
  <text x="452" y="132" fill="#64748b" font-size="15">· 调大模型 → <tspan fill="#b45309" font-weight="bold">ProviderService</tspan></text>
  <text x="452" y="164" fill="#64748b" font-size="15">· 执行工具 → <tspan fill="#15803d" font-weight="bold">ToolExecutor</tspan></text>
</svg>
