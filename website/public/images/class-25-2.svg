<svg viewBox="0 0 820 240" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="240" fill="#ffffff"/>
  <rect x="30" y="28" width="360" height="188" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="52" y="62" fill="#b45309" font-size="18" font-weight="bold">AgentScheduler 负责</text>
  <text x="52" y="98" fill="#3f3f46" font-size="15">· 读配置里的 cron 表达式，到点触发</text>
  <text x="52" y="128" fill="#3f3f46" font-size="15">· 拼一条消息，交给 AgentService</text>
  <text x="52" y="158" fill="#3f3f46" font-size="15">· 防止同一个任务重叠执行</text>
  <text x="52" y="188" fill="#3f3f46" font-size="15">· 记这次触发成不成功</text>
  <rect x="430" y="28" width="360" height="188" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="452" y="62" fill="#475569" font-size="18" font-weight="bold">AgentScheduler 不管</text>
  <text x="452" y="98" fill="#64748b" font-size="15">· 消息说什么 → Profile / SKILL.md</text>
  <text x="452" y="128" fill="#64748b" font-size="15">· 消息怎么处理 → ReActLoop</text>
  <text x="452" y="158" fill="#64748b" font-size="15">· 多实例谁来执行 → 分布式协调</text>
  <text x="452" y="188" fill="#64748b" font-size="15">　（Phase 2 的事，不是现在）</text>
</svg>
