  <text x="320" y="83" fill="#6366f1" font-size="9" text-anchor="middle">统一入口</text>
  <line x1="395" y1="70" x2="448" y2="70" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c271)"/>
  <rect x="450" y="40" width="150" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
