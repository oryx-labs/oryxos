  <text x="525" y="90" fill="#1e40af" font-size="8.5" text-anchor="middle">MemoryService 注入记忆</text>
  <line x1="600" y1="70" x2="653" y2="70" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c271)"/>
