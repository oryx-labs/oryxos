  <text x="720" y="83" fill="#9333ea" font-size="9" text-anchor="middle">调 LLM · 写 llm_calls</text>
  <line x1="720" y1="100" x2="720" y2="138" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c271)"/>
  <rect x="655" y="140" width="130" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.4"/>
