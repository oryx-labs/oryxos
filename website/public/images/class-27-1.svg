<svg viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="320" fill="#ffffff"/>
  <defs>
    <marker id="c271" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="40" y="40" width="150" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="115" y="65" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">① 输入</text>
  <text x="115" y="83" fill="#64748b" font-size="9" text-anchor="middle">chat / REST（人推）</text>
  <line x1="190" y1="70" x2="243" y2="70" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c271)"/>
