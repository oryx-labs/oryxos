<svg viewBox="0 0 820 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="340" fill="#ffffff"/>
  <defs>
    <marker id="mm" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/></marker>
    <marker id="mg" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="40" y="70" width="170" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="125" y="100" fill="#1d4ed8" font-size="13" font-weight="bold" text-anchor="middle">① 对话进行中</text>
  <text x="125" y="120" fill="#334155" font-size="10" text-anchor="middle">短期记忆持续累积</text>
  <rect x="230" y="70" width="170" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="315" y="100" fill="#b45309" font-size="13" font-weight="bold" text-anchor="middle">② 压缩 + 提炼</text>
  <text x="315" y="120" fill="#92400e" font-size="10" text-anchor="middle">窗口快满/会话结束时触发</text>
  <rect x="420" y="70" width="170" height="70" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="505" y="100" fill="#6d28d9" font-size="13" font-weight="bold" text-anchor="middle">③ 写入长期记忆</text>
  <text x="505" y="120" fill="#5b21b6" font-size="10" text-anchor="middle">定期做记忆压缩</text>
  <rect x="610" y="70" width="170" height="70" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="695" y="100" fill="#15803d" font-size="13" font-weight="bold" text-anchor="middle">④ 下次对话检索</text>
  <text x="695" y="120" fill="#166534" font-size="10" text-anchor="middle">拼回上下文，回到 ①</text>
  <line x1="210" y1="105" x2="226" y2="105" stroke="#94a3b8" stroke-width="2" marker-end="url(#mg)"/>
  <line x1="400" y1="105" x2="416" y2="105" stroke="#94a3b8" stroke-width="2" marker-end="url(#mg)"/>
  <line x1="590" y1="105" x2="606" y2="105" stroke="#94a3b8" stroke-width="2" marker-end="url(#mg)"/>
  <path d="M695,140 L695,250 L125,250 L125,140" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#mm)"/>
  <text x="410" y="248" fill="#b45309" font-size="12" font-weight="bold" text-anchor="middle">循环往复</text>
  <text x="410" y="315" fill="#64748b" font-size="12" text-anchor="middle">这就是为什么这几个概念是一套的——它们分别是这个循环里的不同环节</text>
</svg>
