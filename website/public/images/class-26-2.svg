<svg viewBox="0 0 820 350" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="350" fill="#ffffff"/>
  <defs>
    <marker id="c262" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="c262r" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ef4444"/></marker>
  </defs>
  <rect x="270" y="20" width="280" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="410" y="41" fill="#475569" font-size="12" font-weight="bold" text-anchor="middle">业务系统</text>
  <text x="410" y="59" fill="#64748b" font-size="10" text-anchor="middle">POST /api/v1/sessions/{id}/messages</text>
  <line x1="410" y1="70" x2="410" y2="96" stroke="#94a3b8" stroke-width="2" marker-end="url(#c262)"/>
  <rect x="270" y="98" width="280" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="119" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">SessionApiController</text>
  <text x="410" y="137" fill="#1e40af" font-size="10" text-anchor="middle">参数校验 · 响应包装，不碰业务逻辑</text>
  <line x1="410" y1="148" x2="410" y2="174" stroke="#94a3b8" stroke-width="2" marker-end="url(#c262)"/>
  <rect x="270" y="176" width="280" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2.4"/>
  <text x="410" y="197" fill="#15803d" font-size="12" font-weight="bold" text-anchor="middle">AgentService.process</text>
  <text x="410" y="215" fill="#166534" font-size="10" text-anchor="middle">跟 CLI 完全同一个入口，进 ReAct 循环</text>
  <line x1="410" y1="226" x2="410" y2="252" stroke="#94a3b8" stroke-width="2" marker-end="url(#c262)"/>
  <rect x="270" y="254" width="280" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="410" y="275" fill="#475569" font-size="12" font-weight="bold" text-anchor="middle">响应 JSON 返回</text>
  <text x="410" y="293" fill="#64748b" font-size="10" text-anchor="middle">同步阻塞直进直出 · 每个请求一个 virtual thread</text>
  <line x1="550" y1="200" x2="588" y2="200" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#c262r)"/>
  <rect x="590" y="165" width="200" height="70" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="690" y="188" fill="#b91c1c" font-size="11.5" font-weight="bold" text-anchor="middle">GlobalExceptionHandler</text>
  <text x="690" y="206" fill="#991b1b" font-size="9.5" text-anchor="middle">任何异常 → 统一错误 JSON</text>
  <text x="690" y="222" fill="#991b1b" font-size="9.5" text-anchor="middle">errorCode · message · timestamp</text>
  <text x="410" y="336" fill="#64748b" font-size="11.5" text-anchor="middle">400 参数错 · 404 不存在 · 500 内部错 · 503 Provider 故障 · Agent 调用超 60 秒返回 504</text>
</svg>
