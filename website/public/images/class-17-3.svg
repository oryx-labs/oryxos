<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="380" fill="#ffffff"/>
  <defs>
    <marker id="gy2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="am2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/></marker>
    <marker id="gr2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22c55e"/></marker>
  </defs>
  <rect x="300" y="20" width="240" height="44" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="420" y="47" fill="#4338ca" font-size="14" font-weight="bold" text-anchor="middle">接用户消息 → 追加 Session</text>
  <line x1="420" y1="64" x2="420" y2="88" stroke="#94a3b8" stroke-width="2" marker-end="url(#gy2)"/>
  <rect x="270" y="90" width="300" height="48" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="420" y="112" fill="#6d28d9" font-size="14" font-weight="bold" text-anchor="middle">组装 Prompt</text>
  <text x="420" y="130" fill="#7c3aed" font-size="11" text-anchor="middle">PromptBuilder：system + Memory + 历史 + 工具</text>
  <line x1="420" y1="138" x2="420" y2="162" stroke="#94a3b8" stroke-width="2" marker-end="url(#gy2)"/>
  <rect x="300" y="164" width="240" height="44" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="420" y="191" fill="#b45309" font-size="14" font-weight="bold" text-anchor="middle">调大模型（ProviderService）</text>
  <line x1="420" y1="208" x2="420" y2="232" stroke="#94a3b8" stroke-width="2" marker-end="url(#gy2)"/>
  <polygon points="420,234 545,272 420,310 295,272" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="420" y="277" fill="#b45309" font-size="13" font-weight="bold" text-anchor="middle">有工具调用？</text>
  <line x1="545" y1="272" x2="640" y2="272" stroke="#22c55e" stroke-width="2" marker-end="url(#gr2)"/>
  <text x="592" y="263" fill="#15803d" font-size="12" font-weight="bold" text-anchor="middle">有</text>
  <rect x="642" y="248" width="150" height="48" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="717" y="270" fill="#15803d" font-size="12" font-weight="bold" text-anchor="middle">ToolExecutor</text>
  <text x="717" y="287" fill="#15803d" font-size="10" text-anchor="middle">执行 → 结果回填</text>
  <path d="M717,248 L717,112 L570,112" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#am2)"/>
  <text x="700" y="140" fill="#b45309" font-size="11" text-anchor="middle">回到组装 Prompt</text>
  <line x1="295" y1="272" x2="200" y2="272" stroke="#94a3b8" stroke-width="2" marker-end="url(#gy2)"/>
  <text x="247" y="263" fill="#64748b" font-size="12" font-weight="bold" text-anchor="middle">没有</text>
  <rect x="30" y="248" width="168" height="48" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="114" y="277" fill="#15803d" font-size="13" font-weight="bold" text-anchor="middle">返回最终响应</text>
  <text x="420" y="348" fill="#64748b" font-size="12" text-anchor="middle">每轮把模型响应和工具结果都追加回 Session · 转够最大轮数强制收尾</text>
</svg>
