<svg viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="320" fill="#ffffff"/>
  <defs>
    <marker id="mr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="60" y="40" width="340" height="180" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2.6"/>
  <text x="230" y="65" fill="#4338ca" font-size="14" font-weight="bold" text-anchor="middle">主上下文 · 相当于内存</text>
  <rect x="90" y="90" width="280" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="230" y="118" fill="#b45309" font-size="13" font-weight="bold" text-anchor="middle">核心记忆 Core Memory</text>
  <text x="230" y="138" fill="#92400e" font-size="11" text-anchor="middle">小而恒定，永远在场，不换出</text>
  <text x="230" y="195" fill="#4338ca" font-size="11" text-anchor="middle">+ 当前对话历史（随会话变化）</text>
  <rect x="460" y="40" width="300" height="180" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="610" y="70" fill="#475569" font-size="14" font-weight="bold" text-anchor="middle">外部上下文 · 相当于磁盘</text>
  <text x="610" y="100" fill="#334155" font-size="13" font-weight="bold" text-anchor="middle">归档记忆 Archival Memory</text>
  <text x="610" y="122" fill="#64748b" font-size="11" text-anchor="middle">完整历史 + 长期积累的事实</text>
  <text x="610" y="146" fill="#64748b" font-size="11" text-anchor="middle">模型看不见，必须检索调回来才能用</text>
  <line x1="460" y1="115" x2="400" y2="115" stroke="#22c55e" stroke-width="2" marker-end="url(#mr)"/>
  <text x="430" y="105" fill="#15803d" font-size="10" font-weight="bold" text-anchor="middle">检索换入</text>
  <line x1="400" y1="155" x2="460" y2="155" stroke="#f59e0b" stroke-width="2" marker-end="url(#mr)"/>
  <text x="430" y="170" fill="#b45309" font-size="10" font-weight="bold" text-anchor="middle">归档换出</text>
  <text x="410" y="290" fill="#64748b" font-size="12" text-anchor="middle">触发信号：上下文快满时，Agent 自己决定该总结、该记进核心、该归档、该丢</text>
</svg>
