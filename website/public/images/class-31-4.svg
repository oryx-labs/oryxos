<svg viewBox="0 0 820 430" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="430" fill="#ffffff"/>
  <defs>
    <marker id="c314" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="410" y="20" fill="#0f172a" font-size="13" font-weight="bold" text-anchor="middle">GitHub 日报 Agent 端到端 —— 目录带脚本，shell 跑抓确定性数据</text>

  <!-- ① 触发 -->
  <rect x="240" y="34" width="340" height="52" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.4"/>
  <text x="410" y="55" fill="#b45309" font-size="12" font-weight="bold" text-anchor="middle">① 每天 09:30 自动触发</text>
  <text x="410" y="74" fill="#92400e" font-size="9.5" text-anchor="middle">github-daily 这个 Agent（一个目录）到点开工</text>
  <line x1="410" y1="86" x2="410" y2="104" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c314)"/>

  <!-- ② 注入正文 + 记忆 -->
  <rect x="240" y="106" width="340" height="58" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2.2"/>
  <text x="410" y="128" fill="#15803d" font-size="11.5" font-weight="bold" text-anchor="middle">② 注入 AGENT.md 正文 + MEMORY.md</text>
  <text x="410" y="146" fill="#166534" font-size="9.5" text-anchor="middle">正文即这个 Agent 的指令 · 那条"关注 Agent/推理"记忆跟着进</text>
  <text x="410" y="160" fill="#166534" font-size="9.5" text-anchor="middle">没有能力索引、没有 use_skill —— 正文直接说"跑脚本"</text>
  <line x1="410" y1="164" x2="410" y2="182" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c314)"/>

  <!-- ③ shell 跑脚本 -->
  <rect x="240" y="184" width="340" height="72" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2.6"/>
  <text x="410" y="205" fill="#c2410c" font-size="11.5" font-weight="bold" text-anchor="middle">③ shell 跑 python scripts/github_trending.py</text>
  <text x="410" y="223" fill="#9a3412" font-size="9.5" text-anchor="middle">Sandbox 放行 python + 限定该 Agent 的 scripts/ 目录 · 脚本抓 GitHub 返回 JSON</text>
  <text x="410" y="240" fill="#9a3412" font-size="9.5" text-anchor="middle">脚本产出的 JSON 进上下文 · 代码不进 · 写 tool_invocations</text>
  <line x1="410" y1="256" x2="410" y2="274" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c314)"/>

  <!-- ④ 组稿 + notify -->
  <rect x="240" y="276" width="340" height="52" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2.4"/>
  <text x="410" y="297" fill="#be185d" font-size="12" font-weight="bold" text-anchor="middle">④ LLM 组三段日报 → notify 推送</text>
  <text x="410" y="316" fill="#db2777" font-size="9.5" text-anchor="middle">今日 / 本月 / AI 重点 · AI 段按记忆偏好排 · 组稿是 LLM 干的</text>

  <text x="410" y="356" fill="#0f172a" font-size="11" font-weight="bold" text-anchor="middle">抓数据是脚本干的（确定性），组稿排序是 LLM 干的 —— OryxOS 不解析任何步骤</text>
  <text x="410" y="382" fill="#b91c1c" font-size="10" text-anchor="middle">⚠ 信任边界：脚本子进程自己发网络，绕过 http_get 域名白名单</text>
  <text x="410" y="400" fill="#64748b" font-size="10" text-anchor="middle">装一个带脚本的 Agent = 信任作者（沙箱只到解释器 + 脚本目录，容器隔离留扩展）</text>
</svg>
