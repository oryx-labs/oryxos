<svg viewBox="0 0 820 470" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="470" fill="#ffffff"/>
  <defs>
    <marker id="c314" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="410" y="18" fill="#0f172a" font-size="13" font-weight="bold" text-anchor="middle">GitHub 日报 Agent 端到端 —— 渐进式披露 L1 / L2 / L3 全链</text>

  <!-- ① 触发 -->
  <rect x="240" y="30" width="340" height="52" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.4"/>
  <text x="410" y="51" fill="#b45309" font-size="12" font-weight="bold" text-anchor="middle">① 每天 09:30 自动触发</text>
  <text x="410" y="70" fill="#92400e" font-size="9.5" text-anchor="middle">github-daily 这个 Agent（Profile）到点开工</text>
  <line x1="410" y1="82" x2="410" y2="98" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c314)"/>

  <!-- ② L1 -->
  <rect x="240" y="100" width="340" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2.2"/>
  <circle cx="266" cy="126" r="13" fill="#16a34a"/><text x="266" y="130" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">L1</text>
  <text x="418" y="121" fill="#15803d" font-size="11.5" font-weight="bold" text-anchor="middle">system prompt 注入 &lt;available_skills&gt; 索引 + MEMORY.md</text>
  <text x="418" y="139" fill="#166534" font-size="9.5" text-anchor="middle">全部能力的 name+description 在此 · 那条"关注 Agent/推理"记忆跟着进</text>
  <line x1="410" y1="152" x2="410" y2="168" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c314)"/>

  <!-- ③ L2 -->
  <rect x="240" y="170" width="340" height="52" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.2"/>
  <circle cx="266" cy="196" r="13" fill="#3b82f6"/><text x="266" y="200" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">L2</text>
  <text x="418" y="191" fill="#1d4ed8" font-size="11.5" font-weight="bold" text-anchor="middle">use_skill("github-digest") 加载能力正文</text>
  <text x="418" y="209" fill="#1e40af" font-size="9.5" text-anchor="middle">按 description 命中才加载 · 正文只在此刻才占上下文</text>
  <line x1="410" y1="222" x2="410" y2="238" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c314)"/>

  <!-- ④ L3 -->
  <rect x="240" y="240" width="340" height="66" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2.6"/>
  <circle cx="266" cy="273" r="13" fill="#ea580c"/><text x="266" y="277" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">L3</text>
  <text x="420" y="261" fill="#c2410c" font-size="11.5" font-weight="bold" text-anchor="middle">shell 跑 python scripts/github_trending.py</text>
  <text x="420" y="278" fill="#9a3412" font-size="9.5" text-anchor="middle">Sandbox 放行 python + 限定脚本目录 · 脚本抓 GitHub 返回 JSON</text>
  <text x="420" y="295" fill="#9a3412" font-size="9.5" text-anchor="middle">脚本产出的 JSON 进上下文 · 代码不进 · 写 tool_invocations</text>
  <line x1="410" y1="306" x2="410" y2="322" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c314)"/>

  <!-- ⑤ 组稿 + notify -->
  <rect x="240" y="324" width="340" height="52" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2.4"/>
  <text x="410" y="345" fill="#be185d" font-size="12" font-weight="bold" text-anchor="middle">⑤ LLM 组三段日报 → notify 推送</text>
  <text x="410" y="364" fill="#db2777" font-size="9.5" text-anchor="middle">今日 / 本月 / AI 重点 · AI 段按记忆偏好排 · 组稿是 LLM 干的</text>

  <text x="410" y="405" fill="#0f172a" font-size="11" font-weight="bold" text-anchor="middle">抓数据是脚本干的（确定性），组稿排序是 LLM 干的 —— OryxOS 不解析任何步骤</text>
  <text x="410" y="430" fill="#b91c1c" font-size="10" text-anchor="middle">⚠ 信任边界：脚本子进程自己发网络，绕过 http_get 域名白名单</text>
  <text x="410" y="448" fill="#64748b" font-size="10" text-anchor="middle">装一个带脚本的能力 = 信任这个能力的作者（沙箱只到解释器 + 脚本目录，容器隔离留扩展）</text>
</svg>
