<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="480" fill="#ffffff"/>
  <defs>
    <marker id="c301" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="210" y="20" width="400" height="50" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="410" y="42" fill="#4338ca" font-size="14" font-weight="bold" text-anchor="middle">POST /api/v1/agents</text>
  <text x="410" y="60" fill="#6366f1" font-size="9.5" text-anchor="middle">body：AGENT.md（frontmatter=profile + 正文）；或先 generate 一句话草稿</text>
  <line x1="410" y1="70" x2="410" y2="96" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c301)"/>
  <rect x="210" y="98" width="400" height="50" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.6"/>
  <text x="410" y="120" fill="#b45309" font-size="14" font-weight="bold" text-anchor="middle">AgentLifecycleService.create()</text>
  <text x="410" y="138" fill="#92400e" font-size="10" text-anchor="middle">编排下面四步，全部复用 29 节能力，不写第二套</text>
  <line x1="410" y1="148" x2="410" y2="174" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c301)"/>
  <rect x="210" y="176" width="400" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="196" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">① 校验（复用 ProfileLoader 那套）</text>
  <text x="410" y="212" fill="#1e40af" font-size="10" text-anchor="middle">provider / tool 存在 · name 不冲突</text>
  <line x1="410" y1="218" x2="410" y2="226" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c301)"/>
  <rect x="210" y="228" width="400" height="42" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="410" y="248" fill="#b45309" font-size="12" font-weight="bold" text-anchor="middle">② 写 Agent 目录</text>
  <text x="410" y="264" fill="#92400e" font-size="10" text-anchor="middle">.oryxos/agents/&lt;name&gt;/AGENT.md（跟手工丢的一模一样）</text>
  <line x1="410" y1="270" x2="410" y2="278" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c301)"/>
  <rect x="210" y="280" width="400" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="300" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">③ register(agentDir) — 与 WorkspaceWatcher 共用</text>
  <text x="410" y="316" fill="#1e40af" font-size="10" text-anchor="middle">AgentLoader.deriveProfile → ProfileRegistry.register（29 节）</text>
  <line x1="410" y1="322" x2="410" y2="330" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c301)"/>
  <rect x="210" y="332" width="400" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="352" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">④ 注册定时（可选）</text>
  <text x="410" y="368" fill="#1e40af" font-size="10" text-anchor="middle">带 schedules 就调 AgentScheduler.registerProfile</text>
  <line x1="410" y1="374" x2="410" y2="400" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#c301)"/>
  <rect x="210" y="402" width="400" height="54" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2.4"/>
  <text x="410" y="424" fill="#15803d" font-size="14" font-weight="bold" text-anchor="middle">200 OK</text>
  <text x="410" y="442" fill="#166534" font-size="11" text-anchor="middle">Agent 立刻可用、到点自己跑——全程不重启进程</text>

  <!-- 回滚旁注 -->
  <rect x="628" y="228" width="176" height="94" rx="9" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="716" y="252" fill="#b91c1c" font-size="11" font-weight="bold" text-anchor="middle">任一步失败</text>
  <text x="716" y="274" fill="#991b1b" font-size="9.5" text-anchor="middle">删掉已写的文件</text>
  <text x="716" y="290" fill="#991b1b" font-size="9.5" text-anchor="middle">回滚，不留半个</text>
  <text x="716" y="306" fill="#991b1b" font-size="9.5" text-anchor="middle">Agent</text>
  <line x1="626" y1="270" x2="612" y2="252" stroke="#ef4444" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#c301)"/>
</svg>
