<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="ring-g" x1="8" y1="8" x2="24" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="apex-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded square backdrop -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="url(#icon-bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6" fill="none" stroke="#1e40af" stroke-width="0.5" opacity="0.5"/>

  <!-- Main ring (the "O") — center (16,19) radius 9 -->
  <circle cx="16" cy="19" r="9"
          fill="none"
          stroke="url(#ring-g)"
          stroke-width="1.5"
          filter="url(#glow)"/>

  <!-- Inner neural-network diamond -->
  <!-- Nodes: top(16,14.5) right(20.5,19) bottom(16,23.5) left(11.5,19) -->
  <line x1="16" y1="14.5" x2="20.5" y2="19" stroke="#3b82f6" stroke-width="0.4" opacity="0.55"/>
  <line x1="20.5" y1="19" x2="16" y2="23.5" stroke="#3b82f6" stroke-width="0.4" opacity="0.55"/>
  <line x1="16" y1="23.5" x2="11.5" y2="19" stroke="#3b82f6" stroke-width="0.4" opacity="0.55"/>
  <line x1="11.5" y1="19" x2="16" y2="14.5" stroke="#3b82f6" stroke-width="0.4" opacity="0.55"/>
  <line x1="11.5" y1="19" x2="20.5" y2="19" stroke="#1d4ed8" stroke-width="0.3" opacity="0.40"/>
  <line x1="16" y1="14.5" x2="16" y2="23.5" stroke="#1d4ed8" stroke-width="0.3" opacity="0.40"/>

  <circle cx="16" cy="14.5" r="1" fill="#60a5fa"/>
  <circle cx="20.5" cy="19" r="1" fill="#60a5fa"/>
  <circle cx="16" cy="23.5" r="1" fill="#60a5fa"/>
  <circle cx="11.5" cy="19" r="1" fill="#60a5fa"/>

  <!-- Horns -->
  <path d="M 12,11.5 C 7,8 10,4 16,5"
        stroke="#7dd3fc" stroke-width="1" fill="none"
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 20,11.5 C 25,8 22,4 16,5"
        stroke="#7dd3fc" stroke-width="1" fill="none"
        stroke-linecap="round" filter="url(#glow)"/>

  <circle cx="12" cy="11.5" r="1" fill="#3b82f6"/>
  <circle cx="20" cy="11.5" r="1" fill="#3b82f6"/>

  <!-- Apex -->
  <circle cx="16" cy="5" r="2.5" fill="#3b82f6" opacity="0.20" filter="url(#apex-glow)"/>
  <circle cx="16" cy="5" r="1.6" fill="#93c5fd" opacity="0.60" filter="url(#apex-glow)"/>
  <circle cx="16" cy="5" r="0.9" fill="#e0f2fe"/>
  <circle cx="16" cy="5" r="0.4" fill="#ffffff"/>
</svg>
