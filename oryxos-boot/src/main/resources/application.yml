spring:
  application:
    name: oryxos
  # Principle 2: disable Spring AI's eager auto-configuration. The Provider module wires
  # each ChatModel explicitly (provider name -> ChatModel map); models must not be
  # auto-instantiated at startup (which would also demand API keys before any agent runs).
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAutoConfiguration
      # 宪法 II：禁用 Spring AI eager 模型自动装配。deepseek 走 spring-ai-openai starter，
      # OpenAiAutoConfiguration 会急切建 OpenAiChatModel 并索要 spring.ai.openai.api-key；
      # OryxOS 不用它（Provider 由 ProviderChatModelFactory 显式构造），排掉后 serve 只需 DEEPSEEK_API_KEY。
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:sqlite:oryxos.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      # 宪法 VIII：表结构唯一权威是手工 schema.sql；create-drop 会在重启时毁掉全部数据（18 节纠正）
      ddl-auto: none
    show-sql: false
  sql:
    init:
      mode: always   # 启动执行 schema.sql（CREATE TABLE IF NOT EXISTS，幂等）

server:
  port: 8080

# Sandbox 白名单（第 24 节 WhitelistSandbox；宪法 VI 第一档：应用层校验）。
# 三块各自独立；**空列表 = 该类什么都不允许（deny-all）**，绝非"不校验"——按最小权限收窄。
# 文件路径支持相对/绝对（运行时归一为绝对再比对，挡相对路径穿越）；域名 *. 通配带点号边界（不被形似域名绕过）。
file:
  allowed_paths:
    - .oryxos          # Agent 工作区（Profile/记忆/技能/日志）
shell:
  allowed_commands:    # 只放最小只读命令集；写/删类命令默认不在内
    - ls
    - cat
    - echo
    - grep
http:
  allowed_domains:
    - api.deepseek.com   # Provider 端点（精确匹配）
    - "*.feishu.cn"      # 飞书 webhook（通配真子域）

# 长期记忆后端（第 22 节可插拔）：markdown（默认，零依赖）| sqlite（结构化）| mem0（自托管外部服务）
memory:
  backend: markdown
  mem0:
    base-url: ${MEM0_BASE_URL:}   # 仅 backend=mem0 时使用；自托管实例，走环境变量不落明文
    user-id: ${MEM0_USER_ID:oryxos}

# Provider 清单（宪法 III 显式映射的数据源；凭证走环境变量占位，缺失时启动校验点名报错）
oryxos:
  providers:
    - name: deepseek
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com

# Observability: Actuator + Micrometer/Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  health:
    # Nacos is pulled in transitively by the Spring AI Alibaba starter but OryxOS does not
    # use it; its health indicator would otherwise report DOWN (no Nacos server).
    nacos-config:
      enabled: false
    nacos-discovery:
      enabled: false
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      show-components: always
  metrics:
    tags:
      application: oryxos

# OpenAPI / Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Log levels (formatting/appenders live in logback-spring.xml)
logging:
  level:
    root: INFO
    io.oryxos: DEBUG
